<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Logistica Ordini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; background-color: #fef3c7; color: #92400e; }
        .btn-evadi { background-color: #334155; color: white; padding: 10px 24px; border-radius: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-10">
            <h1 class="font-bold text-xl border-l pl-4 ml-2 text-slate-700">Ordini in Corso</h1>
        </div>
        <a href="ordini_nuovi.html" class="bg-m361-red text-white px-6 py-2 rounded-xl text-xs font-bold uppercase shadow-md">+ NUOVO</a>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex flex-wrap gap-2" id="filter-group">
                <button onclick="caricaOrdini('tutti')" class="bg-[#1e293b] text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase">Tutti</button>
                <button onclick="caricaOrdini('da_ordinare')" class="bg-white border border-slate-200 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold uppercase">Merce da ordinare</button>
                <button onclick="caricaOrdini('da_avvisare')" class="bg-white border border-slate-200 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold uppercase">Clienti da Avvisare</button>
                <button onclick="caricaOrdini('avvisati')" class="bg-white border border-slate-200 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold uppercase">Clienti Avvisati</button>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" oninput="filtraPerNome(this.value)" placeholder="Cerca cliente..." class="w-full pl-10 pr-4 py-2.5 border rounded-xl text-sm outline-none border-slate-200">
            </div>
        </div>

        <div class="space-y-4" id="orders-container">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function caricaOrdini(filtro = 'tutti') {
            let query = _supabase.from('ordini_incorso').select('*').order('created_at', { ascending: false });

            if (filtro === 'da_ordinare') query = query.eq('merce_pronta', false);
            if (filtro === 'da_avvisare') query = query.eq('merce_pronta', true).eq('cliente_avvisato', false);
            if (filtro === 'avvisati') query = query.eq('cliente_avvisato', true);

            const { data: ordini } = await query;
            const container = document.getElementById('orders-container');
            container.innerHTML = "";

            ordini.forEach(ord => {
                const nomeCliente = `${ord.cliente_nome || ''} ${ord.cliente_cognome || ''}`.trim();
                const testoBottone = (ord.modalita_consegna === 'Spedizione' || ord.modalita_consegna === 'Sped.') ? 'SPEDITO' : 'RITIRATO';

                container.insertAdjacentHTML('beforeend', `
                    <div class="ordine-card bg-white border border-slate-200 rounded-3xl p-8 flex items-center justify-between" data-cliente="${nomeCliente}">
                        
                        <div class="w-1/3">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="status-badge">${ord.merce_pronta ? 'Merce Arrivata' : 'Merce da Ordinare'}</span>
                                <span class="text-[10px] text-slate-300 font-mono">#${ord.id.toString().slice(-5)}</span>
                                <button onclick="window.location.href='ordini_nuovi.html?edit=${ord.id}'" class="text-blue-400 ml-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </button>
                                <button onclick="eliminaOrdine('${ord.id}')" class="text-red-300">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                            <h2 class="text-2xl font-black text-slate-800 uppercase">${nomeCliente}</h2>
                        </div>

                        <div class="w-1/3 flex flex-col gap-2">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" ${ord.merce_pronta ? 'checked' : ''} onchange="aggiornaStato('${ord.id}', 'merce_pronta', this.checked)" class="w-5 h-5 border-slate-300 rounded">
                                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Merce Arrivata / Pronta</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" ${ord.cliente_avvisato ? 'checked' : ''} onchange="aggiornaStato('${ord.id}', 'cliente_avvisato', this.checked)" class="w-5 h-5 border-slate-300 rounded">
                                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Cliente Avvisato</span>
                            </label>
                        </div>

                        <div class="w-1/3 text-right flex items-center justify-end gap-10">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Da Incassare</p>
                                <p class="text-3xl font-black text-m361-red">€ ${ord.totale_ordine || '0.00'}</p>
                            </div>
                            <button onclick="evadiOrdine('${ord.id}', '${ord.modalita_consegna}')" class="btn-evadi hover:bg-slate-800">
                                ${testoBottone}
                            </button>
                        </div>
                    </div>
                `);
            });
        }

        async function aggiornaStato(id, campo, valore) {
            await _supabase.from('ordini_incorso').update({ [campo]: valore }).eq('id', id);
        }

        function filtraPerNome(testo) {
            const query = testo.toLowerCase();
            document.querySelectorAll('.ordine-card').forEach(card => {
                const nome = card.getAttribute('data-cliente').toLowerCase();
                card.style.display = nome.includes(query) ? 'flex' : 'none';
            });
        }

        window.onload = () => caricaOrdini();
    </script>
</body>
</html>
