<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Modifica Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .border-m361-red { border-color: #b75252; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .wa-active { color: #25D366; }
        .wa-inactive { color: #cbd5e1; }
        .row-error { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-6 md:px-8 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-8">
            <h1 id="header-title" class="font-bold text-lg border-l pl-4 text-slate-700">Modifica Ordine</h1>
        </div>
        <button onclick="window.location.href='ordini_incorso.html'" class="flex items-center gap-2 text-slate-500 hover:text-m361-red transition-colors font-bold text-sm">
            <i class="fas fa-arrow-left"></i> Annulla
        </button>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        <form id="orderForm" class="space-y-6" onsubmit="return handleUpdate(event)">
            
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                        <span class="w-1 h-4 bg-m361-red rounded-full"></span> Emporio
                    </h2>
                    <div class="space-y-4">
                        <div id="citta-wrapper" class="space-y-2">
                            <select id="select-emporio" onchange="handleCittaChange(this)" required class="w-full border-gray-200 border rounded-xl p-3 text-sm bg-gray-50">
                                <option value="">Città *</option>
                                <option value="Casalmaggiore">Casalmaggiore</option>
                                <option value="Cremona">Cremona</option>
                                <option value="Reggio Emilia">Reggio Emilia</option>
                                <option value="Viadana">Viadana</option>
                            </select>
                        </div>
                        <div id="operatore-wrapper">
                            <select id="select-operatore" required class="w-full border-gray-200 border rounded-xl p-3 text-sm">
                                <option value="">Seleziona Operatore *</option>
                            </select>
                        </div>
                        <input type="date" id="order-date" required class="w-full border-gray-200 border rounded-xl p-3 text-sm">
                    </div>
                </div>

                <div class="lg:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                        <span class="w-1 h-4 bg-m361-red rounded-full"></span> Cliente
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
                        <input type="text" id="cust-nome" placeholder="Nome *" required class="border-gray-200 border rounded-xl p-3 text-sm">
                        <input type="text" id="cust-cognome" placeholder="Cognome *" required class="border-gray-200 border rounded-xl p-3 text-sm">
                        <div class="relative">
                            <input type="tel" id="cust-tel" placeholder="Cellulare *" required class="w-full border-gray-200 border rounded-xl p-3 text-sm">
                        </div>
                        <input type="email" id="cust-email" placeholder="Email" class="border-gray-200 border rounded-xl p-3 text-sm">
                        <div class="flex gap-2 p-1 bg-gray-100 rounded-xl h-[46px] items-center">
                            <label class="flex-1 flex items-center justify-center text-xs font-bold cursor-pointer h-full rounded-lg has-[:checked]:bg-white transition-all">
                                <input type="radio" name="mod_consegna" value="Ritiro" checked class="hidden"> Ritiro
                            </label>
                            <label class="flex-1 flex items-center justify-center text-xs font-bold cursor-pointer h-full rounded-lg has-[:checked]:bg-white transition-all">
                                <input type="radio" name="mod_consegna" value="Spedizione" class="hidden"> Sped.
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div id="groups-container" class="space-y-8"></div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex flex-col md:flex-row justify-end items-stretch gap-4">
                    <div class="bg-slate-50 border border-slate-200 p-4 rounded-2xl flex flex-col justify-center min-w-[180px] text-center">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Totale Ordine</span>
                        <span id="grand-total" class="text-2xl font-bold text-slate-800">€ 0.00</span>
                    </div>
                    <div class="bg-white border border-slate-200 p-4 rounded-2xl flex flex-col justify-center items-center min-w-[180px]">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Acconto</span>
                        <input type="text" id="acconto" onfocus="clearCurrency(this)" onblur="formatCurrency(this)" oninput="calcGrandTotal()" class="w-full text-center text-slate-700 bg-transparent text-2xl outline-none" value="€ 0.00">
                    </div>
                    <div class="bg-m361-red p-4 rounded-2xl flex flex-col justify-center min-w-[180px] text-center shadow-lg">
                        <span class="text-[9px] font-bold text-white/80 uppercase">Da Pagare</span>
                        <span id="saldo-finale" class="text-2xl font-bold text-white">€ 0.00</span>
                    </div>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-m361-red text-white font-bold py-5 rounded-2xl uppercase tracking-widest shadow-xl hover:scale-[1.01] transition-all">
                <i class="fas fa-sync-alt mr-2"></i> Aggiorna Ordine
            </button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let groupCount = 0;
        let currentType = 'standard';
        const params = new URLSearchParams(window.location.search);
        const ordineId = params.get('id');

        const OPERATORI_DATA = {
            "Cremona": ["Chiara Monteverdi", "Emilio Mazzolari", "Giulia Galelli"],
            "Casalmaggiore": ["Alessandra Rivetti", "Barbara Araldi", "Carla Maffei", "Chiara Monteverdi", "Edoardo Pavesi", "Emilio Mazzolari", "Erica Bossi", "Francesco Lunardini", "Giovanna Raineri", "Giulia Frigeri", "Giuseppe Lunardini", "Ileana Galli", "Maria Marcella Scaravonati", "Matilde Chiarini", "Michele Marchini", "Roberta Vezzosi", "Teyssir Mabrouk", "Vittoria Lunardini"],
            "Viadana": ["Alessia Rovina", "Ave Aroldi", "Barbara Piotrowska", "Carla Bellelli", "Carla Chittolini", "Chiara Monteverdi", "Claudio Mortini", "Donatella Falugi", "Elena Ghelfi", "Emilio Mazzolari", "Franco Furlotti", "Giuseppina Amadini", "Manuela Scazza", "Marta Sanfelici", "Mariagrazia Bertolini", "Mirella Panato", "Roberta Alberini", "Sara Germani", "Tiziana Bortesi"],
            "Reggio Emilia": ["Alessia Bartolomei", "Elsa Scarpa", "Manuela Capanni", "Marica Pioli"]
        };

        // Caricamento Dati Esistenti
        window.onload = async () => {
            if (!ordineId) {
                alert("Nessun ID ordine trovato!");
                return;
            }

            const { data: ord, error } = await _supabase.from('ordini_incorso').select('*').eq('id', ordineId).single();

            if (ord) {
                currentType = ord.tipo_ordine || 'standard';
                document.getElementById('cust-nome').value = ord.cliente_nome || '';
                document.getElementById('cust-cognome').value = ord.cliente_cognome || '';
                document.getElementById('cust-tel').value = ord.cliente_cellulare || '';
                document.getElementById('cust-email').value = ord.cliente_email || '';
                document.getElementById('order-date').value = ord.data_ordine || '';
                document.getElementById('select-emporio').value = ord.citta || '';
                
                // Trigger per caricare gli operatori della città
                handleCittaChange(document.getElementById('select-emporio'));
                document.getElementById('select-operatore').value = ord.operatore || '';

                // Carica prodotti (se salvati come JSON in 'articoli')
                if (ord.articoli && Array.isArray(ord.articoli)) {
                    addGroup(); // Crea il primo gruppo
                    const tbody = document.getElementById(`rows-container-1`);
                    tbody.innerHTML = ''; // Svuota riga vuota
                    ord.articoli.forEach(art => aggiungiRigaConDati(1, art));
                } else {
                    addGroup();
                }
                
                calcGrandTotal();
            }
        };

        function handleCittaChange(select) {
            const citta = select.value;
            const opSelect = document.getElementById('select-operatore');
            opSelect.innerHTML = '<option value="">Seleziona Operatore *</option>';
            const operatori = OPERATORI_DATA[citta] || [];
            operatori.forEach(op => {
                const opt = document.createElement('option');
                opt.value = op; opt.text = op;
                opSelect.add(opt);
            });
        }

        function addGroup() {
            groupCount++;
            const container = document.getElementById('groups-container');
            const groupHtml = `
                <div id="group-${groupCount}" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-slate-700 uppercase text-sm">Prodotti</h3>
                        <button type="button" onclick="aggiungiRigaVuota(${groupCount})" class="bg-slate-100 px-4 py-2 rounded-xl font-bold text-[10px] uppercase"> + aggiungi riga</button>
                    </div>
                    <table class="w-full text-xs">
                        <thead>
                            <tr class="text-[10px] text-gray-400 uppercase text-center">
                                <th class="pb-2 text-left">Codice</th><th class="pb-2 text-left">Descrizione</th><th class="pb-2 w-24">Prezzo</th><th class="pb-2 w-16">Qtà</th><th class="pb-2 w-24 text-right">Totale</th><th class="w-8"></th>
                            </tr>
                        </thead>
                        <tbody id="rows-container-${groupCount}"></tbody>
                    </table>
                </div>`;
            container.insertAdjacentHTML('beforeend', groupHtml);
        }

        function aggiungiRigaConDati(gId, art) {
            const tbody = document.getElementById(`rows-container-${gId}`);
            const rId = Date.now() + Math.random();
            const tr = document.createElement('tr');
            tr.id = `row-${rId}`;
            tr.innerHTML = `
                <td class="p-1"><input type="text" value="${art.codice || ''}" class="p-codice w-full border border-gray-200 rounded-lg p-2"></td>
                <td class="p-1"><input type="text" value="${art.descrizione || ''}" class="p-desc w-full border border-gray-200 rounded-lg p-2"></td>
                <td class="p-1"><input type="text" value="€ ${(art.prezzo || 0).toFixed(2)}" oninput="calcRow('${rId}')" class="p-prezzo w-full border border-gray-200 rounded-lg p-2 text-right"></td>
                <td class="p-1"><input type="number" value="${art.qta || 1}" oninput="calcRow('${rId}')" class="p-qta w-full border border-gray-200 rounded-lg p-2 text-center"></td>
                <td class="p-1 text-right font-bold">€ <span class="row-total">0.00</span></td>
                <td class="p-1 text-center"><button type="button" onclick="this.parentElement.parentElement.remove(); calcGrandTotal();">✕</button></td>
            `;
            tbody.appendChild(tr);
            calcRow(rId);
        }

        function aggiungiRigaVuota(gId) {
            aggiungiRigaConDati(gId, {codice:'', descrizione:'', prezzo:0, qta:1});
        }

        function calcRow(rId) {
            const row = document.getElementById(`row-${rId}`);
            const qta = parseFloat(row.querySelector('.p-qta').value) || 0;
            const prezzo = parseFloat(row.querySelector('.p-prezzo').value.replace('€', '').trim()) || 0;
            row.querySelector('.row-total').innerText = (qta * prezzo).toFixed(2);
            calcGrandTotal();
        }

        function calcGrandTotal() {
            let grand = 0;
            document.querySelectorAll('.row-total').forEach(el => grand += parseFloat(el.innerText) || 0);
            document.getElementById('grand-total').innerText = `€ ${grand.toFixed(2)}`;
            const acc = parseFloat(document.getElementById('acconto').value.replace('€', '').trim()) || 0;
            document.getElementById('saldo-finale').innerText = `€ ${(grand - acc).toFixed(2)}`;
        }

        // SALVATAGGIO MODIFICHE
        async function handleUpdate(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = "Aggiornamento in corso...";

            const articoli = [];
            document.querySelectorAll('tr[id^="row-"]').forEach(tr => {
                articoli.push({
                    codice: tr.querySelector('.p-codice').value,
                    descrizione: tr.querySelector('.p-desc').value,
                    prezzo: parseFloat(tr.querySelector('.p-prezzo').value.replace('€', '').trim()) || 0,
                    qta: parseInt(tr.querySelector('.p-qta').value) || 0
                });
            });

            const updates = {
                citta: document.getElementById('select-emporio').value,
                operatore: document.getElementById('select-operatore').value,
                data_ordine: document.getElementById('order-date').value,
                cliente_nome: document.getElementById('cust-nome').value,
                cliente_cognome: document.getElementById('cust-cognome').value,
                cliente_cellulare: document.getElementById('cust-tel').value,
                cliente_email: document.getElementById('cust-email').value,
                articoli: articoli,
                totale_ordine: parseFloat(document.getElementById('grand-total').innerText.replace('€', '').trim()),
                da_pagare: parseFloat(document.getElementById('saldo-finale').innerText.replace('€', '').trim())
            };

            const { error } = await _supabase.from('ordini_incorso').update(updates).eq('id', ordineId);

            if (!error) {
                alert("Ordine aggiornato con successo!");
                window.location.href = "ordini_incorso.html";
            } else {
                alert("Errore: " + error.message);
                btn.disabled = false;
            }
        }

        function formatCurrency(input) {
            let val = parseFloat(input.value.replace('€', '').trim()) || 0;
            input.value = "€ " + val.toFixed(2);
        }
        function clearCurrency(input) { input.value = input.value.replace('€', '').trim(); }

    </script>
</body>
</html>
