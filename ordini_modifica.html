<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Modifica Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .input-field { 
            width: 100%; padding: 1rem; background-color: #f8fafc; 
            border: 1px solid #e2e8f0; border-radius: 1.5rem; 
            outline: none; transition: all 0.2s;
        }
        .input-field:focus { border-color: #b75252; ring: 2px; ring-color: #b75252/20; }
        label { display: block; text-transform: uppercase; font-size: 10px; font-weight: 900; color: #94a3b8; letter-spacing: 0.1em; margin-bottom: 0.5rem; margin-left: 0.5rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-3xl w-full bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100 relative">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <a href="ordini_incorso.html" class="text-slate-400 hover:text-[#b75252] transition-colors">
                    <i class="fas fa-arrow-left text-xl"></i>
                </a>
                <h1 class="text-3xl font-[900] text-slate-800 uppercase tracking-tight">Modifica Ordine</h1>
            </div>
            <span id="order-id-display" class="text-xs font-mono text-slate-300 bg-slate-50 px-3 py-1 rounded-full"></span>
        </div>

        <form id="edit-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label>Nome</label>
                    <input type="text" id="nome" class="input-field" required>
                </div>
                <div>
                    <label>Cognome</label>
                    <input type="text" id="cognome" class="input-field" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label>Telefono</label>
                    <input type="text" id="telefono" class="input-field">
                </div>
                <div>
                    <label>Emporio di Riferimento</label>
                    <select id="emporio" class="input-field">
                        <option value="CREMONA - CANALE">CREMONA - CANALE</option>
                        <option value="REGGIO EMILIA">REGGIO EMILIA</option>
                        <option value="MANTOVA">MANTOVA</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label>Modalità Consegna</label>
                    <select id="modalita_consegna" class="input-field">
                        <option value="Ritiro in sede">Ritiro in sede</option>
                        <option value="Spedizione">Spedizione</option>
                    </select>
                </div>
                <div>
                    <label>Totale da Incassare (€)</label>
                    <input type="number" step="0.01" id="totale_incassare" class="input-field font-bold text-[#b75252]" placeholder="0.00">
                </div>
            </div>

            <div>
                <label>Note / Articoli da ordinare</label>
                <textarea id="note" rows="4" class="input-field resize-none"></textarea>
            </div>

            <button type="submit" class="w-full bg-[#b75252] text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-lg shadow-[#b75252]/30 hover:opacity-90 active:scale-[0.98] transition-all text-lg">
                Salva Modifiche
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const ordineId = params.get('id');

        async function caricaDati() {
            if (!ordineId) return;
            
            const { data, error } = await _supabase.from('ordini_incorso').select('*').eq('id', ordineId).single();
            
            if (data) {
                document.getElementById('order-id-display').innerText = `#${data.id.toString().slice(-6)}`;
                document.getElementById('nome').value = data.cliente_nome || '';
                document.getElementById('cognome').value = data.cliente_cognome || '';
                document.getElementById('telefono').value = data.cliente_telefono || '';
                document.getElementById('emporio').value = data.emporio || 'CREMONA - CANALE';
                document.getElementById('modalita_consegna').value = data.modalita_consegna || 'Ritiro in sede';
                document.getElementById('totale_incassare').value = data.totale_incassare || '';
                document.getElementById('note').value = data.note || '';
            }
        }

        document.getElementById('edit-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const updates = {
                cliente_nome: document.getElementById('nome').value,
                cliente_cognome: document.getElementById('cognome').value,
                cliente_telefono: document.getElementById('telefono').value,
                emporio: document.getElementById('emporio').value,
                modalita_consegna: document.getElementById('modalita_consegna').value,
                totale_incassare: parseFloat(document.getElementById('totale_incassare').value),
                note: document.getElementById('note').value
            };

            const { error } = await _supabase.from('ordini_incorso').update(updates).eq('id', ordineId);

            if (!error) {
                window.location.href = 'ordini_incorso.html';
            } else {
                alert("Errore: " + error.message);
            }
        };

        window.onload = caricaDati;
    </script>
</body>
</html>
