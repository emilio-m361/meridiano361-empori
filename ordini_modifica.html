<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Modifica Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .input-field { border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.75rem; width: 100%; outline: none; transition: all 0.2s; font-size: 0.875rem; }
        .input-field:focus { border-color: #b75252; ring: 2px; ring-color: #fee2e2; }
        .label-style { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; display: block; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-white">
            <div class="flex items-center gap-4">
                <a href="logistica.html" class="text-slate-400 hover:text-slate-600 transition-all">
                    <i class="fas fa-arrow-left text-xl"></i>
                </a>
                <h1 class="text-3xl font-[900] text-slate-800 tracking-tighter uppercase">Modifica Ordine</h1>
            </div>
            <div id="ordine-id-badge" class="text-slate-300 font-mono text-sm">#------</div>
        </div>

        <div class="p-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="col-span-1 space-y-4 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-[#b75252] rounded-full"></span> EMPORIO
                    </h3>
                    <div>
                        <label class="label-style">Città</label>
                        <select id="emporio" class="input-field">
                            <option value="Cremona">Cremona</option>
                            <option value="Parma">Parma</option>
                            <option value="Piacenza">Piacenza</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-style">Operatore</label>
                        <input type="text" id="operatore" class="input-field" placeholder="Nome operatore">
                    </div>
                </div>

                <div class="col-span-2 space-y-4 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-[#b75252] rounded-full"></span> CLIENTE
                    </h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-style">Nome</label>
                            <input type="text" id="cliente_nome" class="input-field">
                        </div>
                        <div>
                            <label class="label-style">Cognome</label>
                            <input type="text" id="cliente_cognome" class="input-field">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-style">Cellulare</label>
                            <input type="text" id="cliente_cellulare" class="input-field">
                        </div>
                        <div>
                            <label class="label-style">Email</label>
                            <input type="email" id="cliente_email" class="input-field">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h3 class="font-bold text-slate-700 flex items-center gap-2 uppercase text-sm tracking-widest">
                        <span class="w-1.5 h-6 bg-[#b75252] rounded-full"></span> Prodotti
                    </h3>
                    <button onclick="aggiungiRigaProdotto()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-black transition-all">
                        + Aggiungi Riga
                    </button>
                </div>

                <div class="grid grid-cols-12 gap-2 px-6 py-3 bg-white border-b border-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <div class="col-span-2">Codice</div>
                    <div class="col-span-3">Descrizione</div>
                    <div class="col-span-1 text-center">Prezzo</div>
                    <div class="col-span-1 text-center">Qtà</div>
                    <div class="col-span-1 text-center text-emerald-600">Da Parte</div>
                    <div class="col-span-1 text-center text-blue-600">Da Forn.</div>
                    <div class="col-span-1 text-center text-red-600">Da Ord.</div>
                    <div class="col-span-1 text-right">Totale</div>
                    <div class="col-span-1"></div>
                </div>

                <div id="prodotti-container" class="p-4 space-y-2 max-h-[400px] overflow-y-auto">
                    </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-6 pt-6 border-t border-slate-100">
                <div class="flex gap-4">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 min-w-[150px]">
                        <label class="label-style text-center">Totale Ordine</label>
                        <div id="totale-ordine" class="text-2xl font-black text-slate-800 text-center">€ 0.00</div>
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100 min-w-[150px]">
                        <label class="label-style text-center text-red-400">Da Pagare</label>
                        <div id="da-pagare" class="text-2xl font-black text-red-600 text-center">€ 0.00</div>
                    </div>
                </div>

                <button onclick="salvaModifiche()" class="bg-[#b75252] text-white px-12 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:scale-105 active:scale-95 transition-all w-full md:w-auto">
                    <i class="fas fa-sync-alt mr-2"></i> Aggiorna Ordine
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const ordineId = urlParams.get('id');

        async function caricaDati() {
            if (!ordineId) return;
            
            const { data: ord, error } = await _supabase.from('ordini_incorso').select('*').eq('id', ordineId).single();
            if (error) { alert("Errore caricamento dati"); return; }

            // Riempimento anagrafica
            document.getElementById('ordine-id-badge').innerText = `#${ord.id.toString().slice(-6)}`;
            document.getElementById('emporio').value = ord.emporio || '';
            document.getElementById('operatore').value = ord.operatore || '';
            document.getElementById('cliente_nome').value = ord.cliente_nome || '';
            document.getElementById('cliente_cognome').value = ord.cliente_cognome || '';
            document.getElementById('cliente_cellulare').value = ord.cliente_cellulare || '';
            document.getElementById('cliente_email').value = ord.cliente_email || '';

            // Riempimento prodotti
            const container = document.getElementById('prodotti-container');
            container.innerHTML = '';
            
            if (ord.articoli && ord.articoli.length > 0) {
                ord.articoli.forEach(art => aggiungiRigaProdotto(art));
            } else {
                aggiungiRigaProdotto();
            }
            calcolaTotali();
        }

        function aggiungiRigaProdotto(dati = null) {
            const container = document.getElementById('prodotti-container');
            const html = `
                <div class="grid grid-cols-12 gap-2 items-center riga-prodotto bg-slate-50/50 p-3 rounded-2xl border border-slate-100 hover:border-slate-300 transition-all">
                    <div class="col-span-2"><input type="text" class="codice input-field !p-2" placeholder="Cod" value="${dati ? dati.codice : ''}"></div>
                    <div class="col-span-3"><input type="text" class="descrizione input-field !p-2" placeholder="Descrizione" value="${dati ? dati.descrizione : ''}"></div>
                    <div class="col-span-1"><input type="number" step="0.01" class="prezzo input-field !p-2 text-right" value="${dati ? dati.prezzo : '0.00'}" oninput="calcolaTotali()"></div>
                    <div class="col-span-1"><input type="number" class="qta input-field !p-2 text-center" value="${dati ? dati.qta : '1'}" oninput="calcolaTotali()"></div>
                    <div class="col-span-1"><input type="number" class="da_parte input-field !p-2 text-center border-emerald-100 bg-emerald-50/30" value="${dati ? dati.da_parte : '0'}" oninput="calcolaTotali()"></div>
                    <div class="col-span-1"><input type="number" class="da_forn input-field !p-2 text-center border-blue-100 bg-blue-50/30" value="${dati ? dati.da_forn : '0'}" oninput="calcolaTotali()"></div>
                    <div class="col-span-1"><input type="number" class="da_ord input-field !p-2 text-center border-red-100 bg-red-50 font-bold text-red-600" value="0" readonly></div>
                    <div class="col-span-1 text-right font-black text-slate-700 text-xs riga-totale">€ 0.00</div>
                    <div class="col-span-1 text-center">
                        <button onclick="this.closest('.riga-prodotto').remove(); calcolaTotali();" class="text-slate-300 hover:text-red-500 transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            calcolaTotali();
        }

        function calcolaTotali() {
            let totaleGen = 0;
            document.querySelectorAll('.riga-prodotto').forEach(riga => {
                const qta = parseFloat(riga.querySelector('.qta').value) || 0;
                const prezzo = parseFloat(riga.querySelector('.prezzo').value) || 0;
                const dParte = parseFloat(riga.querySelector('.da_parte').value) || 0;
                const dForn = parseFloat(riga.querySelector('.da_forn').value) || 0;
                
                // Calcolo Da Ordinare
                const daOrd = qta - dParte - dForn;
                riga.querySelector('.da_ord').value = daOrd > 0 ? daOrd : 0;
                
                // Calcolo Riga
                const rTotale = qta * prezzo;
                riga.querySelector('.riga-totale').innerText = `€ ${rTotale.toFixed(2)}`;
                totaleGen += rTotale;
            });
            document.getElementById('totale-ordine').innerText = `€ ${totaleGen.toFixed(2)}`;
            document.getElementById('da-pagare').innerText = `€ ${totaleGen.toFixed(2)}`;
        }

        async function salvaModifiche() {
            const articoli = [];
            document.querySelectorAll('.riga-prodotto').forEach(riga => {
                articoli.push({
                    codice: riga.querySelector('.codice').value,
                    descrizione: riga.querySelector('.descrizione').value,
                    prezzo: parseFloat(riga.querySelector('.prezzo').value),
                    qta: parseInt(riga.querySelector('.qta').value),
                    da_parte: parseInt(riga.querySelector('.da_parte').value),
                    da_forn: parseInt(riga.querySelector('.da_forn').value),
                    da_ord: parseInt(riga.querySelector('.da_ord').value)
                });
            });

            const updateData = {
                emporio: document.getElementById('emporio').value,
                operatore: document.getElementById('operatore').value,
                cliente_nome: document.getElementById('cliente_nome').value,
                cliente_cognome: document.getElementById('cliente_cognome').value,
                cliente_cellulare: document.getElementById('cliente_cellulare').value,
                cliente_email: document.getElementById('cliente_email').value,
                articoli: articoli,
                totale_ordine: parseFloat(document.getElementById('totale-ordine').innerText.replace('€ ', ''))
            };

            const { error } = await _supabase.from('ordini_incorso').update(updateData).eq('id', ordineId);

            if (!error) {
                alert("Ordine aggiornato con successo!");
                window.location.href = 'logistica.html';
            } else {
                alert("Errore durante l'aggiornamento.");
                console.error(error);
            }
        }

        window.onload = caricaDati;
    </script>
</body>
</html>
