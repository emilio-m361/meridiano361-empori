<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Nuovo Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Icone FontAwesome per WhatsApp -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .bg-m361-red-soft { background-color: rgba(183, 82, 82, 0.1); }
        .bg-parte-green { background-color: rgba(107, 141, 83, 0.15); }
        .bg-m361-antracite { background-color: #334155; }
        
        .section-title {
            color: #475569;
            background-color: rgba(183, 82, 82, 0.15);
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
        }
        
        input:focus, select:focus { outline: none; border-color: #b75252; box-shadow: 0 0 0 1px #b75252; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .type-pill { cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .type-pill.active { border-color: #b75252; background-color: white; color: #b75252; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="ordini.html"><img src="logom361_rosso.jpg" alt="Logo" class="h-8"></a>
            <h1 class="font-bold text-lg border-l pl-4 ml-2 text-slate-700">Nuovo Ordine</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <!-- SELEZIONE TIPOLOGIA ORDINE -->
        <div id="order-type-selection" class="mb-8 text-center bg-white p-8 rounded-2xl shadow-sm border">
            <h3 class="text-gray-500 font-bold uppercase text-xs tracking-widest mb-4">Seleziona Tipo di Ordine</h3>
            <div class="flex justify-center gap-4">
                <button onclick="initOrder('standard')" class="px-8 py-4 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold transition-all">ORDINE STANDARD</button>
                <button onclick="initOrder('bomboniere')" class="px-8 py-4 bg-m361-red text-white hover:opacity-90 rounded-xl font-bold transition-all shadow-lg">ORDINE BOMBONIERE</button>
            </div>
        </div>

        <form id="orderForm" class="hidden">
            <!-- SEZIONE 1: EMPORIO -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                    <span class="section-title text-[10px]">Emporio</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Città *</label>
                            <select id="select-emporio" onchange="handleEmporioChange()" required class="w-full border rounded-lg p-2.5 text-sm bg-gray-50">
                                <option value="" selected>Seleziona...</option>
                                <option value="Casalmaggiore">Casalmaggiore</option>
                                <option value="Cremona">Cremona</option>
                                <option value="Reggio Emilia">Reggio Emilia</option>
                                <option value="Viadana">Viadana</option>
                            </select>
                        </div>
                        <button type="button" class="mt-5 text-xl text-slate-400">+</button>
                    </div>
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Operatore *</label>
                            <select id="select-operator" required class="w-full border rounded-lg p-2.5 text-sm bg-gray-50">
                                <option value="" selected>Seleziona...</option>
                            </select>
                        </div>
                        <button type="button" class="mt-5 text-xl text-slate-400">+</button>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Data *</label>
                        <input type="date" id="order-date" required class="w-full border rounded-lg p-2.5 text-sm">
                    </div>
                </div>
            </div>

            <!-- SEZIONE 2: CLIENTE -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                    <span class="section-title text-[10px]">Cliente</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nome *</label><input type="text" required class="w-full border rounded-lg p-2.5 text-sm"></div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cognome *</label><input type="text" required class="w-full border rounded-lg p-2.5 text-sm"></div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Email</label><input type="email" class="w-full border rounded-lg p-2.5 text-sm"></div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Modalità *</label>
                        <div class="flex gap-4 p-2.5 bg-gray-50 border rounded-lg h-[42px] items-center">
                            <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="radio" name="mod_consegna" value="Ritiro" required class="accent-m361-red"> Ritiro</label>
                            <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="radio" name="mod_consegna" value="Spedizione" class="accent-m361-red"> Spediz.</label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cellulare *</label>
                        <div class="flex items-center gap-2">
                            <input type="tel" required class="flex-1 border rounded-lg p-2.5 text-sm">
                            <label class="cursor-pointer">
                                <input type="checkbox" checked class="hidden peer">
                                <i class="fab fa-whatsapp text-2xl text-gray-300 peer-checked:text-green-500 transition-colors"></i>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SEZIONE 3: PRODOTTI / BOMBONIERE -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold tracking-widest uppercase flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                        <span id="title-prodotti" class="section-title text-[10px]">Prodotti</span>
                    </h2>
                    <button type="button" onclick="addRow()" class="text-[10px] bg-m361-antracite text-white px-6 py-2.5 rounded-xl font-bold uppercase shadow-md">
                        + Aggiungi Riga
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[10px] text-gray-400 uppercase tracking-wider border-b">
                                <th class="p-2 font-bold w-32">Codice</th>
                                <th class="p-2 font-bold">Descrizione / Composizione</th>
                                <th class="p-2 font-bold w-16">Qtà</th>
                                <th class="p-2 font-bold w-24">Prezzo</th>
                                <th id="col-confez" class="p-2 font-bold w-24 hidden text-center">Confez. (€3)</th>
                                <th class="p-2 font-bold w-24 text-right">Totale</th>
                                <th class="p-2 font-bold w-16 bg-parte-green text-center">Da Parte</th>
                                <th class="p-2 font-bold w-16 text-center">Da Forn.</th>
                                <th class="p-2 w-8"></th>
                            </tr>
                        </thead>
                        <tbody id="order-rows"></tbody>
                        <tfoot class="border-t-2 border-gray-100">
                            <tr class="bg-gray-50/50">
                                <td colspan="4" class="p-4 text-right font-bold text-xs uppercase text-gray-400">Riepilogo:</td>
                                <td colspan="2" class="p-2">
                                    <div class="flex items-center justify-between bg-white border p-2 rounded-lg">
                                        <span class="text-[9px] font-bold text-gray-400 uppercase">Totale Ordine</span>
                                        <span id="grand-total" class="font-bold text-slate-800">€ 0.00</span>
                                    </div>
                                </td>
                                <td colspan="2" class="p-2">
                                    <div class="flex items-center justify-between bg-m361-red text-white p-2 rounded-lg shadow-sm">
                                        <span class="text-[9px] font-bold uppercase">Da Pagare</span>
                                        <span id="saldo-finale" class="font-bold">€ 0.00</span>
                                    </div>
                                </td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="w-full md:w-80 bg-m361-red text-white font-bold py-5 rounded-xl uppercase text-xs tracking-widest shadow-xl">Salva Ordine</button>
            </div>
        </form>
    </main>

    <script>
        let currentOrderType = 'standard';
        let operatoriDB = {
            "Cremona": ["Emilio Mazzolari", "Chiara Monteverdi", "Giulia Galelli"],
            "Reggio Emilia": ["Marica Pioli", "Manuela Capanni", "Alessia Bartolomei"],
            "Viadana": ["Emilio Mazzolari", "Chiara Monteverdi"],
            "Casalmaggiore": ["Emilio Mazzolari", "Chiara Monteverdi"]
        };

        function initOrder(type) {
            currentOrderType = type;
            document.getElementById('order-type-selection').classList.add('hidden');
            document.getElementById('orderForm').classList.remove('hidden');
            document.getElementById('title-prodotti').innerText = type === 'bomboniere' ? 'Configurazione Bomboniere' : 'Prodotti';
            
            if(type === 'bomboniere') {
                document.getElementById('col-confez').classList.remove('hidden');
            }
            addRow();
        }

        function handleEmporioChange() {
            const val = document.getElementById('select-emporio').value;
            const opSelect = document.getElementById('select-operator');
            opSelect.innerHTML = '<option value="">Seleziona...</option>';
            (operatoriDB[val] || []).forEach(op => opSelect.add(new Option(op, op)));
        }

        function addRow() {
            const tbody = document.getElementById('order-rows');
            const id = Date.now();
            const row = document.createElement('tr');
            row.className = "border-b hover:bg-gray-50/50 transition-all";
            row.id = `row-${id}`;

            let secondCol = currentOrderType === 'standard' 
                ? `<input type="text" class="w-full border rounded p-2 text-sm" placeholder="Descrizione prodotto...">`
                : `<textarea class="w-full border rounded p-2 text-sm h-16" placeholder="Es: Sacchetto rosso, oggetto blu, fiorellino..."></textarea>`;

            let confezCol = currentOrderType === 'bomboniere'
                ? `<td class="p-2 text-center"><input type="checkbox" id="conf-${id}" onchange="calc(${id})" class="w-5 h-5 accent-m361-red"></td>`
                : `<td class="hidden"></td>`;

            row.innerHTML = `
                <td class="p-2"><input type="text" class="w-full border rounded p-2 text-xs font-mono uppercase"></td>
                <td class="p-2">${secondCol}</td>
                <td class="p-2"><input type="number" id="qty-${id}" value="1" oninput="calc(${id})" class="w-full border rounded p-2 text-sm font-bold text-center"></td>
                <td class="p-2"><input type="number" step="0.01" id="pr-u-${id}" oninput="calc(${id})" class="w-full border rounded p-2 text-sm text-right" placeholder="€"></td>
                ${confezCol}
                <td class="p-2 font-bold text-right text-sm text-slate-600">€ <span id="tot-riga-${id}">0.00</span></td>
                <td class="p-2 bg-parte-green"><input type="number" id="parte-${id}" class="w-full border rounded p-2 text-sm bg-transparent text-center"></td>
                <td class="p-2"><input type="number" id="forn-${id}" class="w-full border rounded p-2 text-sm text-center"></td>
                <td class="p-2 text-center"><button type="button" onclick="this.closest('tr').remove(); calcFinals()" class="text-gray-300 hover:text-red-500">✕</button></td>
            `;
            tbody.appendChild(row);
        }

        function calc(id) {
            const qty = +document.getElementById(`qty-${id}`).value || 0;
            const pru = +document.getElementById(`pr-u-${id}`).value || 0;
            let total = qty * pru;

            if (currentOrderType === 'bomboniere') {
                const wantsConfez = document.getElementById(`conf-${id}`).checked;
                if (wantsConfez) {
                    total += (qty * 3);
                }
            }

            document.getElementById(`tot-riga-${id}`).innerText = total.toFixed(2);
            calcFinals();
        }

        function calcFinals() {
            let total = 0;
            document.querySelectorAll('[id^="tot-riga-"]').forEach(el => total += parseFloat(el.innerText) || 0);
            document.getElementById('grand-total').innerText = `€ ${total.toFixed(2)}`;
            document.getElementById('saldo-finale').innerText = `€ ${total.toFixed(2)}`;
        }

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Ordine Salvato con Successo!");
            window.location.href = "ordini_incorso.html";
        };

        window.onload = () => { 
            document.getElementById('order-date').valueAsDate = new Date(); 
        };
    </script>
</body>
</html>
