<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>M361 - Gestione Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-m361-red { background-color: #b75252; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
        <h1 id="page-title" class="text-2xl font-black text-slate-800 uppercase mb-8">Nuovo Ordine</h1>
        
        <form id="orderForm" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nome</label>
                    <input type="text" id="cust-nome" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-100">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Cognome</label>
                    <input type="text" id="cust-cognome" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-100">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Totale Ordine (€)</label>
                <input type="number" step="0.01" id="totale-ordine" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-100">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3">Modalità Consegna</label>
                <div class="flex gap-4">
                    <label class="flex-1 border p-4 rounded-xl flex items-center gap-3 cursor-pointer">
                        <input type="radio" name="mod_consegna" value="Ritiro" checked class="w-5 h-5 accent-[#b75252]">
                        <span class="font-bold text-slate-700">Ritiro in sede</span>
                    </label>
                    <label class="flex-1 border p-4 rounded-xl flex items-center gap-3 cursor-pointer">
                        <input type="radio" name="mod_consegna" value="Spedizione" class="w-5 h-5 accent-[#b75252]">
                        <span class="font-bold text-slate-700">Spedizione</span>
                    </label>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#b75252] text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:opacity-90 transition-all">
                Salva Ordine
            </button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');

        // FUNZIONE PER CARICARE I DATI SE SIAMO IN MODALITÀ MODIFICA
        async function initPage() {
            if (editId) {
                document.getElementById('page-title').innerText = "Modifica Ordine";
                document.getElementById('submit-btn').innerText = "Aggiorna Ordine";

                // Recupera i dati da Supabase
                const { data: ord, error } = await _supabase
                    .from('ordini_incorso')
                    .select('*')
                    .eq('id', editId)
                    .single();

                if (ord) {
                    document.getElementById('cust-nome').value = ord.cliente_nome || '';
                    document.getElementById('cust-cognome').value = ord.cliente_cognome || '';
                    document.getElementById('totale-ordine').value = ord.totale_ordine || '';
                    
                    document.querySelectorAll('input[name="mod_consegna"]').forEach(radio => {
                        if(radio.value === ord.modalita_consegna) radio.checked = true;
                    });
                }
            }
        }

        // GESTIONE DEL SALVATAGGIO (INSERT O UPDATE)
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            const formData = {
                cliente_nome: document.getElementById('cust-nome').value,
                cliente_cognome: document.getElementById('cust-cognome').value,
                totale_ordine: document.getElementById('totale-ordine').value,
                modalita_consegna: document.querySelector('input[name="mod_consegna"]:checked').value
            };

            let result;
            if (editId) {
                // MODIFICA: Esegue l'UPDATE sull'ID esistente
                result = await _supabase.from('ordini_incorso').update(formData).eq('id', editId);
            } else {
                // NUOVO: Esegue l'INSERT
                formData.merce_pronta = false;
                formData.cliente_avvisato = false;
                result = await _supabase.from('ordini_incorso').insert([formData]);
            }

            if (!result.error) {
                alert(editId ? "Ordine aggiornato!" : "Ordine creato!");
                window.location.href = 'index.html'; // Sostituisci con il nome del tuo file lista
            } else {
                alert("Errore: " + result.error.message);
                btn.disabled = false;
            }
        };

        window.onload = initPage;
    </script>
</body>
</html>
