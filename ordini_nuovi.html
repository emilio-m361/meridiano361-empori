<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Gestione Ordini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .border-m361-red { border-color: #b75252; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .wa-active { color: #25D366; }
        .wa-inactive { color: #cbd5e1; }
        .row-error { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-6 md:px-8 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-8">
            <h1 id="header-title" class="font-bold text-lg border-l pl-4 text-slate-700 hidden md:block">Nuovo Ordine</h1>
        </div>
        <button onclick="window.location.reload()" class="flex items-center gap-2 text-slate-500 hover:text-m361-red transition-colors font-bold text-sm">
            <i class="fas fa-arrow-left"></i> Indietro
        </button>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        
        <div id="order-type-selection" class="mb-8 text-center bg-white p-8 md:p-16 rounded-3xl shadow-sm border border-gray-100">
            <div class="flex flex-col md:flex-row justify-center gap-6">
                <button onclick="initOrder('standard')" class="group px-10 py-6 bg-m361-red text-white hover:opacity-90 rounded-2xl font-bold transition-all shadow-md text-lg uppercase flex items-center justify-center gap-3">
                    <i class="fas fa-shopping-bag"></i> Ordine Standard
                </button>
                <button onclick="initOrder('bomboniere')" class="group px-10 py-6 bg-m361-red text-white hover:opacity-90 rounded-2xl font-bold transition-all shadow-lg text-lg uppercase flex items-center justify-center gap-3">
                    <i class="fas fa-gift"></i> Ordine Bomboniere
                </button>
            </div>
        </div>

        <form id="orderForm" class="hidden space-y-6" onsubmit="return validateSubmission(event)">
            
            <div class="grid grid-cols-1 lg:grid-cols-4
