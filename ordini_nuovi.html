<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Gestione Ordini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .border-m361-red { border-color: #b75252; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .wa-active { color: #25D366; }
        .wa-inactive { color: #cbd5e1; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-6 md:px-8 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-8">
            <h1 id="header-title" class="font-bold text-lg border-l pl-4 text-slate-700 hidden md:block">Nuovo Ordine</h1>
        </div>
        <button onclick="window.location.href='ordini_incorso.html'" class="flex items-center gap-2 text-slate-500 hover:text-m361-red transition-colors font-bold text-sm">
            <i class="fas fa-arrow-left"></i> Indietro
        </button>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-6">
        <form id="orderForm" class="space-y-6 bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <h2 id="form-title" class="text-xl font-bold uppercase tracking-tight text-slate-800 mb-4">Dati Ordine</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nome *</label>
                    <input type="text" id="cust-nome" required class="w-full border-gray-200 border rounded-xl p-3 text-sm focus:ring-2 focus:ring-red-100 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Cognome *</label>
                    <input type="text" id="cust-cognome" required class="w-full border-gray-200 border rounded-xl p-3 text-sm focus:ring-2 focus:ring-red-100 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Cellulare *</label>
                    <input type="tel" id="cust-tel" required class="w-full border-gray-200 border rounded-xl p-3 text-sm focus:ring-2 focus:ring-red-100 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Email</label>
                    <input type="email" id="cust-email" class="w-full border-gray-200 border rounded-xl p-3 text-sm focus:ring-2 focus:ring-red-100 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-50">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3">Modalità Consegna</label>
                    <div class="flex gap-4">
                        <label class="flex-1 flex items-center justify-center p-3 border rounded-xl cursor-pointer has-[:checked]:border-m361-red has-[:checked]:bg-red-50 transition-all">
                            <input type="radio" name="mod_consegna" value="Ritiro" checked class="hidden"> <span class="text-sm font-semibold">Ritiro</span>
                        </label>
                        <label class="flex-1 flex items-center justify-center p-3 border rounded-xl cursor-pointer has-[:checked]:border-m361-red has-[:checked]:bg-red-50 transition-all">
                            <input type="radio" name="mod_consegna" value="Spedizione" class="hidden"> <span class="text-sm font-semibold">Spedizione</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Totale Ordine (€)</label>
                    <input type="number" step="0.01" id="totale-ordine" required class="w-full border-gray-200 border rounded-xl p-3 text-lg font-bold text-m361-red outline-none">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-m361-red text-white py-4 rounded-2xl font-bold uppercase tracking-widest hover:opacity-90 transition-all shadow-lg">
                Salva Ordine
            </button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');

        // Caricamento dati se in modalità modifica
        async function checkEditMode() {
            if (editId) {
                document.getElementById('header-title').innerText = "Modifica Ordine";
                document.getElementById('form-title').innerText = "Modifica Ordine #" + editId;
                document.getElementById('submit-btn').innerText = "Aggiorna Ordine";

                const { data: ord, error } = await _supabase
                    .from('ordini_incorso')
                    .select('*')
                    .eq('id', editId)
                    .single();

                if (ord) {
                    document.getElementById('cust-nome').value = ord.cliente_nome || '';
                    document.getElementById('cust-cognome').value = ord.cliente_cognome || '';
                    document.getElementById('cust-tel').value = ord.cliente_cellulare || '';
                    document.getElementById('cust-email').value = ord.cliente_email || '';
                    document.getElementById('totale-ordine').value = ord.totale_ordine || '';
                    
                    document.querySelectorAll('input[name="mod_consegna"]').forEach(r => {
                        if(r.value === ord.modalita_consegna) r.checked = true;
                    });
                }
            }
        }

        // Salvataggio (Insert o Update)
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "Salvataggio...";

            const payload = {
                cliente_nome: document.getElementById('cust-nome').value,
                cliente_cognome: document.getElementById('cust-cognome').value,
                cliente_cellulare: document.getElementById('cust-tel').value,
                cliente_email: document.getElementById('cust-email').value,
                totale_ordine: parseFloat(document.getElementById('totale-ordine').value) || 0,
                modalita_consegna: document.querySelector('input[name="mod_consegna"]:checked').value,
                stato: 'Nuovo'
            };

            try {
                let res;
                if (editId) {
                    res = await _supabase.from('ordini_incorso').update(payload).eq('id', editId);
                } else {
                    payload.merce_pronta = false;
                    payload.cliente_avvisato = false;
                    res = await _supabase.from('ordini_incorso').insert([payload]);
                }

                if (res.error) throw res.error;
                
                alert(editId ? "Ordine aggiornato!" : "Ordine creato!");
                window.location.href = "ordini_incorso.html";
            } catch (err) {
                alert("Errore: " + err.message);
                btn.disabled = false;
                btn.innerText = editId ? "Aggiorna Ordine" : "Salva Ordine";
            }
        };

        window.onload = checkEditMode;
    </script>
</body>
</html>
