<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Login Gestione Empori</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #fff5f5, #f8fafc);
        }
        .login-card {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .bg-m361 { background-color: #b75252; }
        .text-m361 { color: #b75252; }
        .focus-m361:focus { border-color: #b75252; ring-color: rgba(183, 82, 82, 0.2); }
        
        /* Animazione pulsante */
        .btn-loading {
            pointer-events: none;
            opacity: 0.8;
        }
        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-[420px]">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-m361 rounded-2xl shadow-lg shadow-red-200 mb-4">
                <i class="fas fa-store text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Meridiano <span class="text-m361">361</span></h1>
            <p class="text-slate-500 font-medium mt-2">Piattaforma Gestione Empori</p>
        </div>

        <div class="login-card bg-white/80 p-8 rounded-[2rem] shadow-2xl shadow-slate-200/60">
            <form id="login-form" class="space-y-5">
                
                <div id="error-msg" class="hidden animate-pulse bg-red-50 text-red-600 p-4 rounded-xl text-sm font-semibold border border-red-100 flex items-center gap-3">
                    <i class="fas fa-circle-exclamation"></i>
                    <span id="error-text"></span>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email Aziendale</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="far fa-envelope"></i>
                        </span>
                        <input type="email" id="email" required 
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-m361 focus:ring-4 focus:ring-red-50 transition-all placeholder:text-slate-400"
                            placeholder="nome@meridiano361.it">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" required 
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-m361 focus:ring-4 focus:ring-red-50 transition-all placeholder:text-slate-400"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="submit-btn" 
                    class="w-full bg-m361 hover:bg-[#a14545] text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-3 shadow-xl shadow-red-200 mt-4 active:scale-[0.98]">
                    <div id="btn-spinner" class="spinner"></div>
                    <span id="btn-label">Accedi al Sistema</span>
                </button>
            </form>
        </div>

        <p class="text-center text-slate-400 text-sm mt-8">
            Accesso riservato al personale autorizzato.<br>
            © 2026 Meridiano 361
        </p>
    </div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient(
            'https://hsalynvxazxqtmsvjrzc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
        );

        // Check sessione
        (async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) window.location.href = 'index.html';
        })();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const label = document.getElementById('btn-label');
            const spinner = document.getElementById('btn-spinner');
            const errorDiv = document.getElementById('error-msg');

            // UI Loading
            btn.classList.add('btn-loading');
            spinner.style.display = 'block';
            label.textContent = 'Verifica in corso...';
            errorDiv.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;

                // Controllo permessi
                const { data: perms, error: pError } = await _supabase
                    .from('user_permissions')
                    .select('*')
                    .eq('email', email.toLowerCase())
                    .single();

                if (pError || !perms) {
                    await _supabase.auth.signOut();
                    throw new Error("Accesso negato: utente non censito.");
                }

                localStorage.setItem('m361_user', JSON.stringify(perms));
                window.location.href = 'index.html';

            } catch (err) {
                document.getElementById('error-text').textContent = err.message === 'Invalid login credentials' ? 'Email o password non corretti.' : err.message;
                errorDiv.classList.remove('hidden');
                btn.classList.remove('btn-loading');
                spinner.style.display = 'none';
                label.textContent = 'Accedi al Sistema';
            }
        });
    </script>
</body>
</html>
