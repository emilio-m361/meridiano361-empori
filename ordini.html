<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Ordini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hover-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Header -->
    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-10">
            <h1 class="font-bold text-xl border-l pl-4 ml-2 text-slate-700">Ordini</h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-8 md:pt-20">
        
        <!-- Griglia Sezioni -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- NUOVO ORDINE (Verde +) -->
            <a href="ordini_nuovi.html" class="hover-card group bg-white p-10 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                <div class="w-20 h-20 bg-emerald-50 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-emerald-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-600 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-slate-800 uppercase tracking-tight">Nuovo Ordine</h3>
            </a>

            <!-- IN CORSO (Rosso Orologio) -->
            <a href="ordini_incorso.html" class="hover-card group bg-white p-10 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                <div class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-600 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-slate-800 uppercase tracking-tight">In Corso</h3>
            </a>

            <!-- ARCHIVIATI (Grigio X) -->
            <a href="ordini_archiviati.html" class="hover-card group bg-white p-10 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                <div class="w-20 h-20 bg-slate-100 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-slate-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-500 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-slate-800 uppercase tracking-tight">Archiviati</h3>
            </a>

        </div>

    </main>

</body>
</html>
