<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Nuovo Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .bg-m361-red-soft { background-color: rgba(183, 82, 82, 0.1); }
        .bg-m361-dark { background-color: #1e293b; }
        
        /* Stile Titoli Sezioni */
        .section-title {
            color: #475569; /* Grigio scuro */
            background-color: rgba(183, 82, 82, 0.15); /* Rosso semitrasparente */
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
        }

        input:focus, select:focus, textarea:focus { outline: none; border-color: #b75252; ring: 1px solid #b75252; }
        
        @media (max-width: 768px) {
            .product-header { display: none; }
            .product-row { 
                display: flex; flex-direction: column; gap: 8px; padding: 15px; 
                border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; background: white;
            }
            .product-row td { display: block; width: 100% !important; padding: 0 !important; border: none !important; }
            .product-row td::before {
                content: attr(data-label); display: block; font-size: 10px; font-weight: 700;
                text-transform: uppercase; color: #94a3b8; margin-bottom: 2px;
            }
        }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="index.html">
                <img src="logom361_rosso.jpg" alt="Logo" class="h-8 hover:opacity-80 transition-opacity">
            </a>
            <h1 class="font-bold text-lg border-l pl-4 ml-2">Nuovo Ordine</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <form id="orderForm">
            
            <!-- SEZIONE 1: EMPORIO -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                    <span class="section-title">Emporio</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Città *</label>
                        <div class="flex gap-2">
                            <select id="select-emporio" onchange="handleEmporioChange()" class="flex-1 border rounded-lg p-2.5 text-sm bg-gray-50 font-semibold">
                                <option value="" disabled selected>Seleziona Città...</option>
                                <option value="Casalmaggiore">Casalmaggiore</option>
                                <option value="Cremona">Cremona</option>
                                <option value="Reggio Emilia">Reggio Emilia</option>
                                <option value="Viadana">Viadana</option>
                            </select>
                            <button type="button" onclick="addCustom('citta')" class="bg-gray-100 px-3 rounded-lg text-gray-500 hover:text-m361-red font-bold">+</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Operatore *</label>
                        <div class="flex gap-2">
                            <select id="select-operator" required class="flex-1 border rounded-lg p-2.5 text-sm bg-gray-50">
                                <option value="" disabled selected>Seleziona Operatore...</option>
                            </select>
                            <button type="button" onclick="addCustom('operatore')" class="bg-gray-100 px-3 rounded-lg text-gray-500 hover:text-m361-red font-bold">+</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Data *</label>
                        <input type="date" id="order-date" required class="w-full border rounded-lg p-2.5 text-sm">
                    </div>
                </div>

                <!-- Campo Canale Cremona -->
                <div id="cremona-options" class="hidden mt-6 p-4 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Canale: *</label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="canale" value="Emporio" class="accent-m361-red" checked> Emporio</label>
                        <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="canale" value="Meridiano361.it" class="accent-m361-red"> Meridiano361.it</label>
                        <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="canale" value="on-earth.it" class="accent-m361-red"> On-earth.it</label>
                    </div>
                </div>
            </div>

            <!-- SEZIONE 2: CLIENTE -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                    <span class="section-title">Cliente</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nome *</label><input type="text" required class="w-full border rounded-lg p-2.5 text-sm"></div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cognome *</label><input type="text" required class="w-full border rounded-lg p-2.5 text-sm"></div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cellulare *</label>
                        <div class="flex items-center gap-3">
                            <input type="tel" required class="flex-1 border rounded-lg p-2.5 text-sm">
                            <label class="flex items-center gap-1 text-[10px] font-bold text-gray-400 cursor-pointer"><input type="checkbox" class="w-4 h-4 accent-[#b75252]"> WA</label>
                        </div>
                    </div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Email</label><input type="email" class="w-full border rounded-lg p-2.5 text-sm"></div>
                </div>
            </div>

            <!-- SEZIONE 3: PRODOTTI -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                        <span class="section-title">Prodotti</span>
                    </h2>
                    <button type="button" onclick="addRow()" class="text-[10px] bg-m361-dark text-white px-4 py-2 rounded-full hover:bg-m361-red transition-colors font-bold uppercase shadow-md">
                        + Aggiungi
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="product-header">
                            <tr class="text-[10px] text-gray-400 uppercase tracking-wider border-b">
                                <th class="p-2 font-bold min-w-[150px]">Codice</th>
                                <th class="p-2 font-bold min-w-[200px]">Descrizione</th>
                                <th class="p-2 font-bold w-16">Qtà</th>
                                <th class="p-2 font-bold w-16">Da Parte</th>
                                <th class="p-2 font-bold w-16">Da Forn.</th>
                                <th class="p-2 font-bold w-40">Da Empori</th>
                                <th class="p-2 font-bold w-40">Da Altri</th>
                                <th class="p-2 font-bold w-20 bg-m361-red-soft text-m361-red">Da Ord.</th>
                                <th class="p-2 w-8"></th>
                            </tr>
                        </thead>
                        <tbody id="order-rows"></tbody>
                    </table>
                </div>
            </div>

            <div class="flex justify-end"><button type="submit" class="w-full md:w-64 bg-m361-red text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest shadow-lg hover:opacity-90 transition-all">Invia Ordine</button></div>
        </form>
    </main>

    <script>
        let operatoriDB = {
            "Cremona": ["Emilio Mazzolari", "Chiara Monteverdi", "Giulia Galelli"],
            "Reggio Emilia": ["Marica Pioli", "Manuela Capanni", "Alessia Bartolomei"],
            "Viadana": ["Emilio Mazzolari", "Chiara Monteverdi", "Roberta Alberini"],
            "Casalmaggiore": ["Emilio Mazzolari", "Chiara Monteverdi", "Barbara Araldi"]
        };

        const cittaBase = ["Casalmaggiore", "Cremona", "Reggio Emilia", "Viadana"];

        function handleEmporioChange() {
            const val = document.getElementById('select-emporio').value;
            document.getElementById('cremona-options').classList.toggle('hidden', val !== 'Cremona');
            updateOperators();
            refreshEmporiDropdowns();
        }

        function updateOperators() {
            const emporio = document.getElementById('select-emporio').value;
            const opSelect = document.getElementById('select-operator');
            opSelect.innerHTML = '<option value="" disabled selected>Seleziona Operatore...</option>';
            (operatoriDB[emporio] || []).forEach(op => {
                const opt = document.createElement('option');
                opt.value = op; opt.text = op;
                opSelect.add(opt);
            });
        }

        function addCustom(tipo) {
            if(tipo === 'citta') {
                const nuova = prompt("Inserisci nome nuova Città:");
                if(nuova) {
                    const sel = document.getElementById('select-emporio');
                    const opt = document.createElement('option');
                    opt.value = nuova; opt.text = nuova;
                    sel.add(opt);
                    sel.value = nuova;
                    operatoriDB[nuova] = [];
                    handleEmporioChange();
                }
            } else {
                const emporio = document.getElementById('select-emporio').value;
                if(!emporio) return alert("Seleziona prima una città");
                const nuovo = prompt("Inserisci Nome e Cognome nuovo operatore:");
                if(nuovo) {
                    operatoriDB[emporio].push(nuovo);
                    updateOperators();
                    document.getElementById('select-operator').value = nuovo;
                }
            }
        }

        function addRow() {
            const tbody = document.getElementById('order-rows');
            const rowId = Date.now();
            const currentCitta = document.getElementById('select-emporio').value;
            
            const row = document.createElement('tr');
            row.className = "product-row border-b hover:bg-gray-50/50 transition-all";
            row.id = `row-${rowId}`;
            
            row.innerHTML = `
                <td data-label="Codice" class="p-2"><input type="text" id="cod-${rowId}" oninput="validateRow(${rowId})" class="w-full border rounded p-2 text-xs font-mono uppercase text-left" maxlength="30"></td>
                <td data-label="Descrizione" class="p-2"><input type="text" id="desc-${rowId}" oninput="validateRow(${rowId})" class="w-full border rounded p-2 text-sm text-left"></td>
                <td data-label="Qtà" class="p-2"><input type="number" min="0" oninput="calc(${rowId})" id="qty-${rowId}" class="w-full text-left border rounded p-2 text-sm font-bold"></td>
                <td data-label="Da Parte" class="p-2"><input type="number" min="0" oninput="calc(${rowId})" id="parte-${rowId}" class="w-full text-left border rounded p-2 text-sm"></td>
                <td data-label="Da Forn." class="p-2"><input type="number" min="0" oninput="calc(${rowId})" id="forn-${rowId}" class="w-full text-left border rounded p-2 text-sm"></td>
                <td data-label="Da Empori" class="p-2">
                    <div class="flex flex-col gap-1">
                        <input type="number" min="0" oninput="calc(${rowId})" id="emp-val-${rowId}" class="w-full text-left border rounded p-1 text-sm">
                        <select id="emp-sel-${rowId}" onchange="calc(${rowId})" class="emporio-select w-full border rounded p-1 text-[10px] bg-white">
                            ${getEmporioOptions(currentCitta)}
                        </select>
                    </div>
                </td>
                <td data-label="Da Altri" class="p-2">
                    <div class="flex flex-col gap-1">
                        <input type="number" min="0" oninput="calc(${rowId})" id="altri-val-${rowId}" class="w-full text-left border rounded p-1 text-sm">
                        <input type="text" id="altri-txt-${rowId}" oninput="calc(${rowId})" class="w-full border rounded p-1 text-[10px]" placeholder="specifica">
                    </div>
                </td>
                <td data-label="Da Ord." class="p-2 bg-m361-red-soft text-left font-bold text-m361-red text-xl" id="total-${rowId}">0</td>
                <td class="p-2 text-right md:text-center"><button type="button" onclick="document.getElementById('row-${rowId}').remove()" class="text-gray-300 hover:text-red-500 p-2">✕</button></td>
            `;
            tbody.appendChild(row);
            validateRow(rowId);
        }

        function validateRow(id) {
            const cod = document.getElementById(`cod-${id}`).value.trim();
            const desc = document.getElementById(`desc-${id}`).value.trim();
            const isValid = cod !== "" || desc !== "";
            document.getElementById(`cod-${id}`).style.borderColor = isValid ? "" : "#fbbf24";
            document.getElementById(`desc-${id}`).style.borderColor = isValid ? "" : "#fbbf24";
        }

        function getEmporioOptions(exclude) {
            let html = '<option value="">- specifica -</option>';
            cittaBase.forEach(c => { if(c !== exclude) html += `<option value="${c}">${c}</option>`; });
            return html;
        }

        function refreshEmporiDropdowns() {
            const current = document.getElementById('select-emporio').value;
            document.querySelectorAll('.emporio-select').forEach(select => {
                const currentVal = select.value;
                select.innerHTML = getEmporioOptions(current);
                select.value = currentVal;
            });
        }

        function calc(id) {
            const q = parseInt(document.getElementById(`qty-${id}`).value) || 0;
            const p = parseInt(document.getElementById(`parte-${id}`).value) || 0;
            const f = parseInt(document.getElementById(`forn-${id}`).value) || 0;
            const ev = parseInt(document.getElementById(`emp-val-${id}`).value) || 0;
            const av = parseInt(document.getElementById(`altri-val-${id}`).value) || 0;

            document.getElementById(`emp-sel-${id}`).style.borderColor = (ev > 0 && !document.getElementById(`emp-sel-${id}`).value) ? '#ef4444' : '';
            document.getElementById(`altri-txt-${id}`).style.borderColor = (av > 0 && !document.getElementById(`altri-txt-${id}`).value) ? '#ef4444' : '';

            const res = q - (p + f + ev + av);
            document.getElementById(`total-${id}`).innerText = res > 0 ? res : 0;
        }

        window.onload = () => {
            document.getElementById('order-date').valueAsDate = new Date();
        };

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            // Controllo obbligatorietà almeno un campo riga
            let valid = true;
            document.querySelectorAll('[id^="row-"]').forEach(row => {
                const id = row.id.split('-')[1];
                if(!document.getElementById(`cod-${id}`).value && !document.getElementById(`desc-${id}`).value) {
                    valid = false;
                    validateRow(id);
                }
            });
            if(!valid) return alert("Per ogni prodotto inserisci almeno il Codice o la Descrizione.");
            alert("Ordine inviato con successo!");
        };
    </script>
</body>
</html>
