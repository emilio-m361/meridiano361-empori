        :root { --red: #B5453A; --dark: #1e293b; }
        body { font-family: 'Nunito', sans-serif; background: #f1f5f9; color: #1e293b; }

        /* ── LAYOUT ── */
        .guida-wrap { display: flex; gap: 0; min-height: calc(100vh - 56px); }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 220px; flex-shrink: 0; background: #fff;
            border-right: 1px solid #e2e8f0;
            position: sticky; top: 56px; height: calc(100vh - 56px);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .sidebar-search {
            padding: 12px 12px 10px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; position: relative;
        }
        .sidebar-search input {
            width: 100%; padding: 8px 10px 8px 32px; border: 1px solid #e2e8f0;
            border-radius: 10px; font-size: 12px; background: #f8fafc;
            outline: none; font-family: 'Nunito', sans-serif; color: #334155;
        }
        .sidebar-search input:focus { border-color: var(--red); background: #fff; }
        .sidebar-search .search-icon {
            position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: 11px; pointer-events: none;
        }
        .sidebar-nav { flex: 1; padding: 6px 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 10px; cursor: pointer; border-radius: 8px;
            font-size: 13px; font-weight: 600; color: #475569;
            transition: all .12s; text-decoration: none; margin-bottom: 2px;
        }
        .nav-item:hover { background: #f8fafc; color: #1e293b; }
        .nav-item.active { background: #fdf1f0; color: var(--red); font-weight: 700; }
        .nav-item .nav-icon { width: 20px; text-align: center; font-size: 14px; flex-shrink: 0; }
        .nav-badge {
            margin-left: auto; font-size: 9px; font-weight: 800; text-transform: uppercase;
            background: #fee2e2; color: #991b1b; padding: 2px 6px; border-radius: 4px;
        }

        /* ── MAIN CONTENT ── */
        .guida-main { flex: 1; min-width: 0; padding: 28px 32px; max-width: 860px; }

        /* ── SECTION HEADER ── */
        .sezione-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
        .sezione-icona {
            width: 48px; height: 48px; border-radius: 14px; background: var(--red);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #fff; flex-shrink: 0;
        }
        .sezione-titolo { font-size: 22px; font-weight: 900; color: var(--dark); line-height: 1.2; }
        .sezione-desc { font-size: 13px; color: #64748b; margin-top: 4px; line-height: 1.6; }
        .meta-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .meta-chip {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .06em; padding: 3px 8px; border-radius: 99px;
        }

        /* ── SUBSECTION ── */
        .sub-header {
            display: flex; align-items: center; gap: 10px;
            margin: 28px 0 14px; padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
        }
        .sub-icon {
            width: 32px; height: 32px; border-radius: 8px; background: #fdf1f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: var(--red); flex-shrink: 0;
        }
        .sub-titolo { font-size: 15px; font-weight: 800; color: var(--dark); }
        .sub-desc { font-size: 12px; color: #64748b; margin-top: 2px; }

        /* ── CARDS ── */
        .card {
            background: #fff; border-radius: 14px; padding: 18px 20px;
            border: 1px solid #f1f5f9; box-shadow: 0 1px 3px rgba(0,0,0,.04);
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: .1em; color: #94a3b8; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .card-title::before {
            content: ''; display: block; width: 3px; height: 12px;
            background: var(--red); border-radius: 2px;
        }

        /* Feature list */
        .feature-list { display: flex; flex-direction: column; gap: 8px; }
        .feature-item { display: flex; align-items: flex-start; gap: 10px; }
        .feature-dot {
            width: 26px; height: 26px; border-radius: 7px; background: #fdf1f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: var(--red); flex-shrink: 0; margin-top: 1px;
        }
        .feature-text { font-size: 13px; color: #334155; line-height: 1.5; }
        .feature-text strong { color: #1e293b; font-weight: 700; }

        /* Steps */
        .step-list { display: flex; flex-direction: column; gap: 10px; }
        .step-item { display: flex; gap: 12px; align-items: flex-start; }
        .step-num {
            width: 24px; height: 24px; border-radius: 50%; background: var(--red);
            color: #fff; font-size: 11px; font-weight: 800; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
        }
        .step-body { flex: 1; }
        .step-title { font-size: 13px; font-weight: 700; color: #1e293b; }
        .step-text { font-size: 12px; color: #64748b; margin-top: 2px; line-height: 1.5; }
        .step-tip {
            display: inline-flex; align-items: center; gap: 5px; margin-top: 6px;
            font-size: 11px; font-weight: 600; color: #0369a1;
            background: #eff6ff; padding: 3px 9px; border-radius: 6px;
        }

        /* Note */
        .note-box {
            background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
            padding: 10px 14px; font-size: 12px; color: #78350f; line-height: 1.6;
            display: flex; gap: 8px; align-items: flex-start; margin-bottom: 12px;
        }
        .note-box i { margin-top: 2px; flex-shrink: 0; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .guida-main { padding: 16px; }
        }

// ═══════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════
const RUOLO_COLORS = {
  'admin':'#fee2e2:#991b1b','dipendente':'#e0f2fe:#0369a1',
  'coordinatore':'#f3e8ff:#7e22ce','responsabile':'#fef9c3:#92400e',
  'volontario':'#f0fdf4:#166534','scu':'#fff7ed:#c2410c','tutti':'#f0fdf4:#166534'
};
const RUOLO_LABELS = {
  'admin':'Admin','dipendente':'Dipendente','coordinatore':'Coordinatore/trice',
  'responsabile':'Responsabile','volontario':'Volontario/a','scu':'Servizio Civile','tutti':'Tutti'
};

let sezioneAttiva = null;

function init() {
  buildSidebar();
  mostraSezione(GUIDA_DATA.sezioni[0].id);
}

function buildSidebar(matches) {
  const nav = document.getElementById('sidebar-nav');
  const lista = matches || GUIDA_DATA.sezioni;
  nav.innerHTML = lista.map(s => {
    const adminOnly = s.ruoli.length === 1 && s.ruoli[0] === 'admin';
    return `<div class="nav-item${sezioneAttiva === s.id ? ' active' : ''}" id="nav-${s.id}" onclick="mostraSezione('${s.id}')">
      <span class="nav-icon"><i class="fas ${s.icona}"></i></span>
      <span>${s.titolo}</span>
      ${adminOnly ? '<span class="nav-badge">Admin</span>' : ''}
    </div>`;
  }).join('');
}

function mostraSezione(id) {
  sezioneAttiva = id;
  const s = GUIDA_DATA.sezioni.find(x => x.id === id);
  if (!s) return;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${id}`);
  if (navEl) { navEl.classList.add('active'); navEl.scrollIntoView({ block: 'nearest' }); }
  renderSezione(s);
}

function ruoliHtml(ruoli) {
  return ruoli.map(r => {
    const [bg, fg] = (RUOLO_COLORS[r] || '#f1f5f9:#475569').split(':');
    const label = RUOLO_LABELS[r] || r;
    return `<span class="meta-chip" style="background:${bg};color:${fg}">${label}</span>`;
  }).join('');
}

function renderFunz(funzionalita) {
  if (!funzionalita.length) return '';
  return `<div class="card">
    <div class="card-title">Funzionalità principali</div>
    <div class="feature-list">${funzionalita.map(f => `
      <div class="feature-item">
        <div class="feature-dot"><i class="fas ${f.icona}"></i></div>
        <div class="feature-text">${f.testo}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderPassaggi(passaggi) {
  if (!passaggi.length) return '';
  return `<div class="card">
    <div class="card-title">Come si usa</div>
    <div class="step-list">${passaggi.map((p, i) => `
      <div class="step-item">
        <div class="step-num">${i + 1}</div>
        <div class="step-body">
          <div class="step-title">${p.titolo}</div>
          <div class="step-text">${p.testo}</div>
          ${p.tip ? `<div class="step-tip"><i class="fas fa-lightbulb"></i> ${p.tip}</div>` : ''}
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderNote(note) {
  if (!note) return '';
  return `<div class="note-box"><i class="fas fa-circle-info"></i><div>${note}</div></div>`;
}

function renderSezione(s) {
  const main = document.getElementById('guida-main');
  const dataFmt = new Date(s.aggiornato).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });

  let body = '';

  if (s.sottosezioni && s.sottosezioni.length) {
    // Sezione con sottosezioni (es. Ordini)
    s.sottosezioni.forEach(sub => {
      body += `
        <div class="sub-header">
          <div class="sub-icon"><i class="fas ${sub.icona}"></i></div>
          <div>
            <div class="sub-titolo">${sub.titolo}</div>
            ${sub.descrizione ? `<div class="sub-desc">${sub.descrizione}</div>` : ''}
          </div>
        </div>
        ${renderFunz(sub.funzionalita)}
        ${renderPassaggi(sub.passaggi)}
        ${renderNote(sub.note)}`;
    });
  } else {
    body = renderFunz(s.funzionalita) + renderPassaggi(s.passaggi) + renderNote(s.note);
  }

  main.innerHTML = `
    <div class="sezione-header">
      <div class="sezione-icona"><i class="fas ${s.icona}"></i></div>
      <div>
        <div class="sezione-titolo">${s.titolo}</div>
        <div class="sezione-desc">${s.descrizione}</div>
        <div class="meta-row">
          ${ruoliHtml(s.ruoli)}
          <span class="meta-chip" style="background:#fffbeb;color:#92400e"><i class="fas fa-clock" style="font-size:9px"></i> ${dataFmt}</span>
        </div>
      </div>
    </div>
    ${body}
    <div style="height:40px"></div>`;
}

// ── RICERCA ──────────────────────────────────────
function searchGuida(q) {
  q = q.trim().toLowerCase();
  if (!q) { buildSidebar(); if (sezioneAttiva) document.getElementById(`nav-${sezioneAttiva}`)?.classList.add('active'); return; }

  const matches = GUIDA_DATA.sezioni.filter(s => {
    const subText = (s.sottosezioni || []).map(sub =>
      [sub.titolo, sub.descrizione,
       ...sub.funzionalita.map(f => f.testo),
       ...sub.passaggi.map(p => p.titolo + ' ' + p.testo),
       sub.note || ''].join(' ')
    ).join(' ');
    const haystack = [s.titolo, s.descrizione,
      ...s.funzionalita.map(f => f.testo),
      ...s.passaggi.map(p => p.titolo + ' ' + p.testo),
      s.note || '', subText].join(' ').toLowerCase();
    return haystack.includes(q);
  });

  buildSidebar(matches);
  if (matches.length === 0) {
    document.getElementById('sidebar-nav').innerHTML =
      '<div style="padding:20px 12px;text-align:center;color:#94a3b8;font-size:12px"><i class="fas fa-magnifying-glass" style="display:block;font-size:20px;margin-bottom:8px"></i>Nessun risultato</div>';
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>

<script src="../../scripts/nav-script.js"></script>
