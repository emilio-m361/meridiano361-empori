<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>M361 - Prezzi</title>
  <!-- Usa i percorsi corretti per i tuoi file M361 -->
  <link rel="stylesheet" href="../nav-style-2.css">
  <script defer src="../nav-script-3.js"></script>
  <style>
    body { background: #f6f1ea; padding-top: 70px; font-family: 'Inter', sans-serif; }
    .wrap { max-width: 900px; margin: auto; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    h1 { font-size: 24px; color: #b75252; }
    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 10px; background: #fffaf6; border-radius: 12px; }
    input, select { padding: 8px; border: 1px solid #e5e7eb; border-radius: 8px; flex: 1; }
    .btn-add { background: #b75252; color: white; padding: 12px 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
    .arrow-btn { background: #1f8f5f; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .ready { border: 2px solid #1f8f5f; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Inserisci i frontali da fare</h1>
    <div class="card">
      <button class="btn-add" id="addBtn">+ Aggiungi frontalino da fare</button>
      <div id="rowContainer" style="margin-top:20px;"></div>
    </div>
    <div class="summary-grid">
      <div class="card" id="sumFrontalini"></div>
      <div class="card" id="sumEtichette"></div>
    </div>
  </div>

  <script>
    let data = [];
    const container = document.getElementById('rowContainer');

    function render() {
      container.innerHTML = '';
      data.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <input placeholder="Emporio" value="${item.e}" oninput="data[${i}].e=this.value; render()">
          <select onchange="data[${i}].t=this.value; render()">
            <option value="frontalino" ${item.t==='frontalino'?'selected':''}>Frontalino</option>
            <option value="etichetta" ${item.t==='etichetta'?'selected':''}>Etichetta</option>
          </select>
          <input placeholder="Descrizione" value="${item.d}" oninput="data[${i}].d=this.value; render()">
          ${(item.e || item.d) ? `<button class="arrow-btn" onclick="invia(${i})">➜</button>` : ''}
          <button onclick="data.splice(${i},1); render()">✕</button>
        `;
        container.appendChild(row);
      });
      aggiornaSintesi();
    }

    function invia(i) { alert('Invio riga ' + i + ': ' + data[i].d); }
    function aggiornaSintesi() {
      const f = data.filter(i => i.t === 'frontalino').length;
      const e = data.filter(i => i.t === 'etichetta').length;
      document.getElementById('sumFrontalini').innerHTML = `<h3>Frontalini: ${f}</h3><p>${Math.floor(f/40)} fogli pronti (40/foglio)</p>`;
      document.getElementById('sumEtichette').innerHTML = `<h3>Etichette: ${e}</h3><p>${Math.floor(e/24)} fogli pronti (24/foglio)</p>`;
    }
    document.getElementById('addBtn').onclick = () => { data.push({e:'', t:'frontalino', d:''}); render(); };
    render();
  </script>
</body>
</html>
