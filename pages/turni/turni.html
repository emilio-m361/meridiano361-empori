<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M361 - Turni</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
    background:#f1f5f9;
    color:#1e293b;
}

.bg-m361-red{
    background:#b75252;
}

.text-m361-red{
    color:#b75252;
}

.card{
    background:white;
    border-radius:24px;
    padding:24px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
    transition:.2s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.day-card{
    background:white;
    border-radius:22px;
    overflow:hidden;
    margin-bottom:14px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.turno{
    flex:1;
    padding:18px;
}

.turno-mat{
    background:#fff7f7;
    border-left:4px solid #f1b7b7;
}

.turno-pom{
    background:#f8fafc;
    border-left:4px solid #cbd5e1;
}

.chip{
    display:inline-flex;
    align-items:center;
    gap:5px;
    border-radius:999px;
    padding:5px 12px;
    font-size:13px;
    font-weight:700;
}

.chip-dip{
    background:#fecaca;
    color:#7f1d1d;
}

.chip-vol{
    background:#dcfce7;
    color:#14532d;
}

.chip-sc{
    background:#e2e8f0;
    color:#334155;
}

.add-btn{
    margin-top:10px;
    font-size:13px;
    font-weight:700;
    color:#94a3b8;
}

.add-btn:hover{
    color:#b75252;
}
</style>
</head>

<body class="pb-24">

<header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between">

        <div class="flex items-center gap-4">
            <h1 id="header-title" class="font-black text-xl text-slate-700">
                Turni
            </h1>
        </div>

        <div id="header-controls" class="flex items-center gap-2"></div>

    </div>
</header>

<main class="max-w-5xl mx-auto p-5">

    <div id="view-empori"></div>

    <div id="view-anni" class="hidden"></div>

    <div id="view-mesi" class="hidden"></div>

    <div id="view-mese" class="hidden"></div>

</main>

<script>

const EMPORI = [
    'Cremona',
    'Casalmaggiore',
    'Viadana',
    'Reggio Emilia'
];

const ANNI = [2026,2027,2028,2029];

const MESI = [
    'Gennaio',
    'Febbraio',
    'Marzo',
    'Aprile',
    'Maggio',
    'Giugno',
    'Luglio',
    'Agosto',
    'Settembre',
    'Ottobre',
    'Novembre',
    'Dicembre'
];

const PERSONALE = {
    'Cremona':[
        {nome:'Emilio Mazzolari',ruolo:'dipendente'},
        {nome:'Chiara Monteverdi',ruolo:'dipendente'},
        {nome:'Barbara Machetti',ruolo:'volontario'},
    ]
};

const turni = {};

let ctx = {
    emporio:null,
    anno:null,
    mese:null
};

window.addEventListener('DOMContentLoaded', () => {
    showEmpori();
});

function setHeader(title, controls=''){

    const hTitle = document.getElementById('header-title');
    const hControls = document.getElementById('header-controls');

    if(hTitle){
        hTitle.innerText = title;
    }

    if(hControls){
        hControls.innerHTML = controls;
    }
}

function hideAll(){

    document.getElementById('view-empori').classList.add('hidden');
    document.getElementById('view-anni').classList.add('hidden');
    document.getElementById('view-mesi').classList.add('hidden');
    document.getElementById('view-mese').classList.add('hidden');

}

function show(id){
    document.getElementById(id).classList.remove('hidden');
}

function backBtn(fn){

    return `
        <button
            onclick="${fn}"
            class="px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-sm font-bold"
        >
            Indietro
        </button>
    `;
}

function showEmpori(){

    hideAll();

    show('view-empori');

    setHeader('Turni');

    const el = document.getElementById('view-empori');

    el.innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5">

            ${EMPORI.map(e => `
                <div class="card text-center" onclick="showAnni('${e}')">

                    <div class="text-2xl font-black text-m361-red mb-2">
                        🏪
                    </div>

                    <div class="font-bold text-slate-700">
                        ${e}
                    </div>

                </div>
            `).join('')}

        </div>
    `;
}

function showAnni(emp){

    ctx.emporio = emp;

    hideAll();

    show('view-anni');

    setHeader(
        emp,
        backBtn('showEmpori()')
    );

    const el = document.getElementById('view-anni');

    el.innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5">

            ${ANNI.map(a => `
                <div class="card text-center" onclick="showMesi(${a})">

                    <div class="text-4xl font-black text-slate-700">
                        ${a}
                    </div>

                </div>
            `).join('')}

        </div>
    `;
}

function showMesi(anno){

    ctx.anno = anno;

    hideAll();

    show('view-mesi');

    setHeader(
        `${ctx.emporio} — ${anno}`,
        backBtn(`showAnni('${ctx.emporio}')`)
    );

    const el = document.getElementById('view-mesi');

    el.innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5">

            ${MESI.map((m,i) => `
                <div class="card text-center" onclick="showMese(${i})">

                    <div class="font-bold text-slate-700">
                        ${m}
                    </div>

                </div>
            `).join('')}

        </div>
    `;
}

function showMese(mese){

    ctx.mese = mese;

    hideAll();

    show('view-mese');

    setHeader(
        `${ctx.emporio} — ${MESI[mese]} ${ctx.anno}`,
        backBtn(`showMesi(${ctx.anno})`)
    );

    renderMese();
}

function renderMese(){

    const container = document.getElementById('view-mese');

    container.innerHTML = '';

    const days = new Date(ctx.anno, ctx.mese + 1, 0).getDate();

    for(let d=1; d<=days; d++){

        const row = document.createElement('div');

        row.className = 'day-card';

        row.innerHTML = `
            <div class="flex">

                <div class="w-24 bg-white border-r border-slate-100 flex flex-col items-center justify-center p-4">

                    <div class="text-xs font-bold uppercase text-slate-400">
                        Giorno
                    </div>

                    <div class="text-5xl font-black text-slate-700">
                        ${d}
                    </div>

                </div>

                <div class="flex-1 flex">

                    <div class="turno turno-mat">

                        <div class="font-black text-red-400 text-xs uppercase mb-3">
                            Mattino
                        </div>

                        <div class="flex flex-wrap gap-2 mb-3">
                            ${renderPersone('Cremona')}
                        </div>

                        <button class="add-btn">
                            + Aggiungi
                        </button>

                    </div>

                    <div class="turno turno-pom">

                        <div class="font-black text-slate-400 text-xs uppercase mb-3">
                            Pomeriggio
                        </div>

                        <div class="flex flex-wrap gap-2 mb-3">
                            ${renderPersone('Cremona')}
                        </div>

                        <button class="add-btn">
                            + Aggiungi
                        </button>

                    </div>

                </div>

            </div>
        `;

        container.appendChild(row);
    }
}

function renderPersone(emp){

    return (PERSONALE[emp] || []).map(p => {

        let cls = 'chip-vol';

        if(p.ruolo === 'dipendente'){
            cls = 'chip-dip';
        }

        if(p.ruolo === 'servizio_civile'){
            cls = 'chip-sc';
        }

        return `
            <span class="chip ${cls}">
                ${p.nome}
            </span>
        `;

    }).join('');
}

</script>

</body>
</html>
