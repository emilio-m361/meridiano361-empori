<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M361 - Gestione Turni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1e293b;min-height:100vh;padding-bottom:100px;}

/* ── LAYOUT ── */
.main{max-width:1200px;margin:0 auto;padding:24px 16px;}
.space-y>*+*{margin-top:18px;}

/* ── CARD ── */
.card{background:#fff;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.card-pad{padding:24px;}

/* ── SECTION TITLE ── */
.sec-title{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#94a3b8;display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.sec-title::before{content:'';display:block;width:3px;height:16px;background:#b75252;border-radius:2px;flex-shrink:0;}

/* ── BUTTONS ── */
.btn-primary{background:#b75252;color:#fff;border:none;border-radius:12px;padding:13px 26px;font-weight:800;font-size:11px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .15s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:8px;}
.btn-primary:hover{background:#8f3d3d;}
.btn-secondary{background:#fff;color:#64748b;border:1.5px solid #e2e8f0;border-radius:12px;padding:13px 20px;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:8px;}
.btn-secondary:hover{border-color:#94a3b8;background:#f8fafc;}

/* ── FILTERS ── */
.filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:24px;}
.filter-group{display:flex;flex-direction:column;gap:6px;}
.filter-label{font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;}
.filter-select{border:1px solid #e2e8f0;border-radius:12px;padding:11px 14px;font-size:13px;font-family:'Inter',sans-serif;color:#334155;background:#fff;min-width:160px;}
.filter-select:focus{outline:none;border-color:#b75252;}

/* ── DAY CARD ── */
.day-card{background:#fff;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;display:grid;grid-template-columns:100px 1fr 1fr;min-height:140px;transition:all .15s;}
.day-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.1);}

/* ── DATE COLUMN ── */
.date-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;border-right:1px solid #f1f5f9;background:#fff;}
.date-col.festivo{background:#fff8f8;}
.day-name{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#475569;}
.day-name.festivo{color:#b75252;}
.day-num{font-size:52px;font-weight:900;line-height:1;margin:4px 0;color:#1e293b;}
.day-num.festivo{color:#b75252;}
.day-month{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#94a3b8;}
.day-month.festivo{color:#e8a0a0;}

/* ── TURNO SECTIONS ── */
.turno-section{padding:20px;display:flex;flex-direction:column;gap:12px;}
.turno-section.mattina{background:linear-gradient(160deg,#fff5f5 0%,#fef0f0 100%);border-left:3px solid #f0c0c0;}
.turno-section.pomeriggio{background:linear-gradient(160deg,#ffffff 0%,#f8fafc 100%);border-left:3px solid #e2e8f0;}
.turno-section.chiuso{background:#fafbfc;}

.turno-header{display:flex;align-items:center;justify-content:space-between;}
.turno-title{font-size:13px;font-weight:800;letter-spacing:.04em;color:#1e293b;}

/* ── BADGES ── */
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;}
.badge-aperto{background:#fff4e5;color:#d97706;border:1px solid #fbbf24;}
.badge-chiuso{background:#fff1f1;color:#b75252;border:1px solid #fca5a5;}

/* ── OPERATORS ── */
.operators{display:flex;flex-direction:column;gap:6px;}
.operator-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;background:#fff;border:1px solid #e2e8f0;max-width:fit-content;}
.operator-chip i{font-size:10px;color:#cbd5e1;cursor:pointer;transition:color .15s;}
.operator-chip i:hover{color:#ef4444;}

.add-link{font-size:12px;font-weight:700;color:#94a3b8;display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:color .15s;}
.add-link:hover{color:#b75252;}

.nessun-turno{font-size:12px;font-style:italic;color:#94a3b8;}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal.show{display:flex;}
.modal-content{background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:500px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-header{padding:24px;border-bottom:1px solid #f1f5f9;}
.modal-title{font-size:18px;font-weight:900;color:#1e293b;}
.modal-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:10px;border:none;background:#f1f5f9;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.modal-close:hover{background:#e2e8f0;color:#1e293b;}
.modal-body{padding:24px;overflow-y:auto;flex:1;}
.modal-footer{padding:20px 24px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end;}

/* ── OPERATOR LIST ── */
.operator-list{display:flex;flex-direction:column;gap:8px;}
.operator-item{padding:12px 16px;border-radius:12px;border:1px solid #e2e8f0;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.operator-item:hover{background:#f8fafc;border-color:#b75252;}
.operator-name{font-size:14px;font-weight:700;color:#334155;}
.operator-role{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;}

/* ── FORM ── */
.form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.form-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#94a3b8;}
.form-input{width:100%;border:1px solid #e2e8f0;border-radius:12px;padding:11px 14px;font-size:13px;font-family:'Inter',sans-serif;color:#334155;background:#fff;}
.form-input:focus{outline:none;border-color:#b75252;}

.loading{text-align:center;padding:60px 20px;color:#94a3b8;}
.loading i{font-size:32px;margin-bottom:12px;display:block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .day-card{grid-template-columns:80px 1fr;min-height:auto;}
  .turno-section.pomeriggio{border-left:none;border-top:3px solid #e2e8f0;}
}
</style>
</head>
<body>

<main class="main">
  
  <div class="card card-pad">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;">
      <div>
        <h1 style="font-size:24px;font-weight:900;color:#1e293b;margin-bottom:4px;">Gestione Turni</h1>
        <p style="font-size:13px;color:#64748b;">Pianificazione presenze mattino e pomeriggio</p>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn-secondary" onclick="exportTurni()">
          <i class="fas fa-download"></i> Esporta
        </button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label class="filter-label">Emporio</label>
        <select id="filter-emporio" class="filter-select" onchange="loadTurni()">
          <option value="Cremona">Cremona</option>
          <option value="Casalmaggiore">Casalmaggiore</option>
          <option value="Reggio Emilia">Reggio Emilia</option>
          <option value="Viadana">Viadana</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Mese</label>
        <select id="filter-mese" class="filter-select" onchange="loadTurni()">
          <option value="0">Gennaio</option>
          <option value="1">Febbraio</option>
          <option value="2">Marzo</option>
          <option value="3">Aprile</option>
          <option value="4">Maggio</option>
          <option value="5">Giugno</option>
          <option value="6">Luglio</option>
          <option value="7">Agosto</option>
          <option value="8">Settembre</option>
          <option value="9">Ottobre</option>
          <option value="10">Novembre</option>
          <option value="11">Dicembre</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Anno</label>
        <select id="filter-anno" class="filter-select" onchange="loadTurni()">
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Calendar -->
  <div id="calendar-container" class="space-y"></div>

  <div id="loading-state" class="card card-pad loading" style="display:none;">
    <i class="fas fa-circle-notch"></i>
    <p>Caricamento turni...</p>
  </div>

</main>

<!-- Modal Add Operator -->
<div id="modal-operator" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Aggiungi Operatore</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="operator-search-wrap">
        <div class="form-group">
          <label class="form-label">Cerca Operatore</label>
          <input type="text" id="search-operator" class="form-input" placeholder="Nome o cognome..." oninput="filterOperators()">
        </div>
        <div class="operator-list" id="operator-list"></div>
      </div>
      
      <div style="text-align:center;margin:20px 0;color:#cbd5e1;font-size:12px;font-weight:700;">OPPURE</div>
      
      <div id="operator-new-wrap">
        <div class="form-group">
          <label class="form-label">Nuovo Operatore</label>
          <input type="text" id="new-operator-name" class="form-input" placeholder="Nome completo">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Annulla</button>
      <button class="btn-primary" onclick="addNewOperator()">
        <i class="fas fa-plus"></i> Aggiungi Nuovo
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ── SUPABASE ── */
const SB_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
let db = null;
try { db = supabase.createClient(SB_URL, SB_KEY); } catch(e) { console.error('Supabase error:', e); }

const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const GIORNI = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

// Default operators per emporio
const OPERATORI = {
  'Cremona':       ['Chiara Monteverdi','Emilio Mazzolari','Giulia Galelli'],
  'Casalmaggiore': ['Alessandra Rivetti','Barbara Araldi','Carla Maffei','Chiara Monteverdi','Edoardo Pavesi','Emilio Mazzolari','Erica Bossi','Francesco Lunardini','Giovanna Raineri','Giulia Frigeri','Giuseppe Lunardini','Ileana Galli','Maria Marcella Scaravonati','Matilde Chiarini','Michele Marchini','Roberta Vezzosi','Teyssir Mabrouk','Vittoria Lunardini'],
  'Viadana':       ['Alessia Rovina','Ave Aroldi','Barbara Piotrowska','Carla Bellelli','Carla Chittolini','Chiara Monteverdi','Claudio Mortini','Donatella Falugi','Elena Ghelfi','Emilio Mazzolari','Franco Furlotti','Giuseppina Amadini','Manuela Scazza','Marta Sanfelici','Mariagrazia Bertolini','Mirella Panato','Roberta Alberini','Sara Germani','Tiziana Bortesi'],
  'Reggio Emilia': ['Alessia Bartolomei','Elsa Scarpa','Manuela Capanni','Marica Pioli']
};

let currentEmporio = 'Cremona';
let currentMese = new Date().getMonth();
let currentAnno = new Date().getFullYear();
let turniData = {}; // {emporio_year_month_day_shift: {aperto: true/false, operatori: []}}
let modalContext = null;

/* ── LOAD TURNI ── */
async function loadTurni() {
  currentEmporio = document.getElementById('filter-emporio').value;
  currentMese = parseInt(document.getElementById('filter-mese').value);
  currentAnno = parseInt(document.getElementById('filter-anno').value);

  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('calendar-container').innerHTML = '';

  if (db) {
    try {
      // Load from Supabase
      const { data, error } = await db
        .from('turni')
        .select('*')
        .eq('emporio', currentEmporio)
        .eq('anno', currentAnno)
        .eq('mese', currentMese + 1);

      if (error) throw error;

      turniData = {};
      if (data) {
        data.forEach(row => {
          const key = `${row.emporio}_${row.anno}_${row.mese}_${row.giorno}_${row.turno}`;
          turniData[key] = {
            aperto: row.aperto,
            operatori: row.operatori || []
          };
        });
      }
    } catch (error) {
      console.error('Error loading turni:', error);
    }
  }

  renderCalendar();
  document.getElementById('loading-state').style.display = 'none';
}

/* ── RENDER CALENDAR ── */
function renderCalendar() {
  const container = document.getElementById('calendar-container');
  const daysInMonth = new Date(currentAnno, currentMese + 1, 0).getDate();
  
  container.innerHTML = '';

  for (let day = 1; day <= daysInMonth; day++) {
    const dateObj = new Date(currentAnno, currentMese, day);
    const dayOfWeek = dateObj.getDay();
    const isFestivo = dayOfWeek === 0; // Domenica

    const matKey = `${currentEmporio}_${currentAnno}_${currentMese + 1}_${day}_mattina`;
    const pomKey = `${currentEmporio}_${currentAnno}_${currentMese + 1}_${day}_pomeriggio`;

    const matData = turniData[matKey] || { aperto: true, operatori: [] };
    const pomData = turniData[pomKey] || { aperto: true, operatori: [] };

    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="date-col ${isFestivo ? 'festivo' : ''}">
        <div class="day-name ${isFestivo ? 'festivo' : ''}">${GIORNI[dayOfWeek]}</div>
        <div class="day-num ${isFestivo ? 'festivo' : ''}">${day}</div>
        <div class="day-month ${isFestivo ? 'festivo' : ''}">${MESI[currentMese].substring(0, 3).toUpperCase()}</div>
      </div>
      
      <div class="turno-section mattina ${!matData.aperto ? 'chiuso' : ''}">
        <div class="turno-header">
          <div class="turno-title">Mattina</div>
          <span class="status-badge ${matData.aperto ? 'badge-aperto' : 'badge-chiuso'}" onclick="toggleTurno('${matKey}')">
            <i class="fas fa-${matData.aperto ? 'store' : 'lock'}"></i>
            ${matData.aperto ? 'APERTO' : 'CHIUSO'}
          </span>
        </div>
        ${renderTurnoContent(matKey, matData, day, 'mattina')}
      </div>
      
      <div class="turno-section pomeriggio ${!pomData.aperto ? 'chiuso' : ''}">
        <div class="turno-header">
          <div class="turno-title">Pomeriggio</div>
          <span class="status-badge ${pomData.aperto ? 'badge-aperto' : 'badge-chiuso'}" onclick="toggleTurno('${pomKey}')">
            <i class="fas fa-${pomData.aperto ? 'store' : 'lock'}"></i>
            ${pomData.aperto ? 'APERTO' : 'CHIUSO'}
          </span>
        </div>
        ${renderTurnoContent(pomKey, pomData, day, 'pomeriggio')}
      </div>
    `;

    container.appendChild(card);
  }
}

function renderTurnoContent(key, data, day, turno) {
  if (!data.aperto) {
    return '<div class="nessun-turno">Nessun turno</div>';
  }

  let html = '<div class="operators">';
  
  if (data.operatori && data.operatori.length > 0) {
    data.operatori.forEach((op, idx) => {
      html += `
        <div class="operator-chip">
          ${op}
          <i class="fas fa-times" onclick="removeOperator('${key}', ${idx})"></i>
        </div>
      `;
    });
  }
  
  html += `</div><div class="add-link" onclick="openAddOperator('${key}', ${day}, '${turno}')">
    <i class="fas fa-plus-circle"></i> Aggiungi
  </div>`;
  
  return html;
}

/* ── TOGGLE TURNO ── */
async function toggleTurno(key) {
  const data = turniData[key] || { aperto: true, operatori: [] };
  data.aperto = !data.aperto;
  
  if (!data.aperto) {
    data.operatori = [];
  }
  
  turniData[key] = data;
  await saveTurno(key);
  renderCalendar();
}

/* ── ADD/REMOVE OPERATOR ── */
function openAddOperator(key, day, turno) {
  modalContext = { key, day, turno };
  document.getElementById('modal-title').textContent = `${turno === 'mattina' ? 'Mattina' : 'Pomeriggio'} - ${day} ${MESI[currentMese]}`;
  document.getElementById('search-operator').value = '';
  document.getElementById('new-operator-name').value = '';
  filterOperators();
  document.getElementById('modal-operator').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-operator').classList.remove('show');
  modalContext = null;
}

function filterOperators() {
  const search = document.getElementById('search-operator').value.toLowerCase();
  const list = document.getElementById('operator-list');
  const currentOps = turniData[modalContext.key]?.operatori || [];
  
  const available = (OPERATORI[currentEmporio] || [])
    .filter(op => !currentOps.includes(op))
    .filter(op => op.toLowerCase().includes(search));

  if (available.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:#94a3b8;font-size:13px;padding:20px;">Nessun operatore disponibile</p>';
    return;
  }

  list.innerHTML = available.map(op => `
    <div class="operator-item" onclick="selectOperator('${op.replace(/'/g, "\\'")}')">
      <span class="operator-name">${op}</span>
    </div>
  `).join('');
}

function selectOperator(name) {
  if (!turniData[modalContext.key]) {
    turniData[modalContext.key] = { aperto: true, operatori: [] };
  }
  
  if (!turniData[modalContext.key].operatori.includes(name)) {
    turniData[modalContext.key].operatori.push(name);
  }
  
  saveTurno(modalContext.key);
  renderCalendar();
  closeModal();
}

function addNewOperator() {
  const name = document.getElementById('new-operator-name').value.trim();
  if (!name) {
    alert('Inserisci il nome dell\'operatore');
    return;
  }

  if (!OPERATORI[currentEmporio]) {
    OPERATORI[currentEmporio] = [];
  }
  
  if (!OPERATORI[currentEmporio].includes(name)) {
    OPERATORI[currentEmporio].push(name);
  }

  selectOperator(name);
}

async function removeOperator(key, index) {
  if (!turniData[key]) return;
  
  turniData[key].operatori.splice(index, 1);
  await saveTurno(key);
  renderCalendar();
}

/* ── SAVE TO SUPABASE ── */
async function saveTurno(key) {
  if (!db) return;

  const parts = key.split('_');
  const emporio = parts[0];
  const anno = parseInt(parts[1]);
  const mese = parseInt(parts[2]);
  const giorno = parseInt(parts[3]);
  const turno = parts[4];

  const data = turniData[key] || { aperto: true, operatori: [] };

  try {
    const { error } = await db
      .from('turni')
      .upsert({
        emporio,
        anno,
        mese,
        giorno,
        turno,
        aperto: data.aperto,
        operatori: data.operatori
      }, {
        onConflict: 'emporio,anno,mese,giorno,turno'
      });

    if (error) throw error;
  } catch (error) {
    console.error('Error saving turno:', error);
    alert('Errore nel salvataggio: ' + error.message);
  }
}

/* ── EXPORT ── */
function exportTurni() {
  let csv = 'Data,Giorno,Mattina,Operatori Mattina,Pomeriggio,Operatori Pomeriggio\n';
  
  const daysInMonth = new Date(currentAnno, currentMese + 1, 0).getDate();
  
  for (let day = 1; day <= daysInMonth; day++) {
    const dateObj = new Date(currentAnno, currentMese, day);
    const dayName = GIORNI[dateObj.getDay()];
    const dateStr = `${day} ${MESI[currentMese]} ${currentAnno}`;
    
    const matKey = `${currentEmporio}_${currentAnno}_${currentMese + 1}_${day}_mattina`;
    const pomKey = `${currentEmporio}_${currentAnno}_${currentMese + 1}_${day}_pomeriggio`;
    
    const matData = turniData[matKey] || { aperto: true, operatori: [] };
    const pomData = turniData[pomKey] || { aperto: true, operatori: [] };
    
    csv += `"${dateStr}","${dayName}","${matData.aperto ? 'APERTO' : 'CHIUSO'}","${matData.operatori.join('; ')}","${pomData.aperto ? 'APERTO' : 'CHIUSO'}","${pomData.operatori.join('; ')}"\n`;
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', `turni_${currentEmporio}_${MESI[currentMese]}_${currentAnno}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* ── INIT ── */
function init() {
  const now = new Date();
  document.getElementById('filter-mese').value = now.getMonth();
  document.getElementById('filter-anno').value = now.getFullYear();
  
  loadTurni();
}

window.addEventListener('load', init);

// Close modal on outside click
document.getElementById('modal-operator').addEventListener('click', function(e) {
  if (e.target === this) {
    closeModal();
  }
});
</script>
