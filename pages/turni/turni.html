<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="stylesheet" href="../../assets/style/nav-style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Turni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f0f2f5; color:#1e293b; }
        .bg-m361-red { background-color:#b75252; }
        .text-m361-red { color:#b75252; }

        /* ── CARD GIORNO ─────────────────────────────── */
        .day-card {
            background:#fff;
            border-radius:20px;
            box-shadow:0 1px 4px rgba(0,0,0,.07);
            overflow:hidden;
            transition:box-shadow .15s;
            margin-bottom:10px;
        }
        .day-card:hover { box-shadow:0 4px 18px rgba(0,0,0,.1); }

        /* colonna data */
        .day-date-col {
            min-width:88px; width:88px;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:16px 10px;
            background:#fff;
            border-right:1px solid #f1f5f9;
        }
        .day-date-col.festivo { background:#fff8f8; }
        .day-weekday  { font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase; }
        .day-num      { font-size:52px;font-weight:900;line-height:1; margin:2px 0; }
        .day-month    { font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase; }
        .day-oggi-badge { font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;
                          background:#b75252;color:#fff;margin-top:4px;letter-spacing:.05em; }

        /* colori testo data */
        .col-normale .day-weekday { color:#475569; }
        .col-normale .day-num     { color:#1e293b; }
        .col-normale .day-month   { color:#94a3b8; }
        .col-festivo .day-weekday { color:#b75252; }
        .col-festivo .day-num     { color:#b75252; }
        .col-festivo .day-month   { color:#e8a0a0; }
        .col-oggi    .day-weekday { color:#b75252; }
        .col-oggi    .day-num     { color:#b75252; }
        .col-oggi    .day-month   { color:#b75252; }

        /* ── TURNO SEZIONI ───────────────────────────── */
        .turno-mat-bg {
            background:linear-gradient(160deg,#fff5f5 0%,#fef0f0 100%);
            border-left:3px solid #f0c0c0;
        }
        .turno-pom-bg {
            background:linear-gradient(160deg,#f8fafc 0%,#eef2f7 100%);
            border-left:3px solid #c8d4e3;
        }
        .turno-chiuso-bg {
            background:repeating-linear-gradient(45deg,#f8fafc,#f8fafc 6px,#f1f5f9 6px,#f1f5f9 12px);
        }

        /* label sezione */
        .turno-lbl { font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase; }
        .turno-lbl-mat { color:#c0504a; }
        .turno-lbl-pom { color:#5a7a9e; }

        /* ── CHIP NOMI ───────────────────────────────── */
        .chip { display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;
                padding:5px 13px;border-radius:999px;cursor:pointer;transition:opacity .15s; }
        .chip:hover { opacity:.72; }
        .chip-mat-dip { background:#fac8c8;color:#7f1d1d; }
        .chip-mat-vol { background:#fde0d0;color:#9a3412; }
        .chip-mat-sc  { background:#fce8e8;color:#b45252;border:1px solid #f0b8b8; }
        .chip-pom-dip { background:#dce6f4;color:#1e3a5f; }
        .chip-pom-vol { background:#e2eedc;color:#14532d; }
        .chip-pom-sc  { background:#eef2f7;color:#334155;border:1px solid #c8d4e3; }
        .chip-ferie    { background:#dbeafe;color:#1e40af; }
        .chip-malattia { background:#fef9c3;color:#854d0e; }

        /* ── BOTTONI CHIUSURA ────────────────────────── */
        .btn-lock { display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
                    padding:3px 9px;border-radius:7px;border:1.5px solid #e2e8f0;
                    color:#94a3b8;background:#fff;cursor:pointer;transition:all .15s; }
        .btn-lock:hover { border-color:#f87171;color:#ef4444;background:#fff5f5; }
        .btn-lock.on { border-color:#fca5a5;color:#dc2626;background:#fff1f1;font-weight:800; }

        /* ── ADD LINK ────────────────────────────────── */
        .add-link { font-size:13px;font-weight:700;color:#94a3b8;display:inline-flex;
                    align-items:center;gap:4px;transition:color .15s;cursor:pointer; }
        .add-link:hover { color:#b75252; }

        /* ── ASSENZA ─────────────────────────────────── */
        .assenza-badge { font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px; }
        .assenza-ferie    { background:#dbeafe;color:#1e40af; }
        .assenza-malattia { background:#fef9c3;color:#854d0e; }

        /* ── PREDEFINITI GRIGLIA ─────────────────────── */
        .day-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:3px; }
        .day-btn { width:28px;height:22px;border-radius:5px;border:1.5px solid #e2e8f0;
                   font-size:9px;font-weight:700;color:#cbd5e1;background:white;
                   cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center; }
        .day-btn:hover { border-color:#f0b8b8;color:#b75252; }
        .day-btn.on-mat { background:#fac8c8;border-color:#f0b8b8;color:#991b1b; }
        .day-btn.on-pom { background:#dce6f4;border-color:#94a3b8;color:#1e3a5f; }

        .card-hover { transition:all .15s;cursor:pointer; }
        .card-hover:hover { transform:translateY(-2px);box-shadow:0 4px 20px rgba(183,82,82,.15); }
    </style>
</head>
<body class="pb-28">

<header class="bg-white border-b border-gray-100 px-5 py-3.5 flex justify-between items-center sticky top-0 z-50 shadow-sm">
    <div class="flex items-center gap-4">
        <img src="../../assets/images/logom361_rosso.jpg" alt="Logo" class="h-8" onerror="this.style.display='none'">
        <h1 id="header-title" class="font-bold text-xl border-l pl-4 text-slate-700">Turni</h1>
    </div>
    <div id="header-controls" class="flex items-center gap-2 flex-wrap justify-end"></div>
</header>

<main class="max-w-4xl mx-auto p-4 md:p-6">

    <div id="view-anni"  class="hidden"></div>
    <div id="view-mesi"  class="hidden"></div>
    <div id="view-mese"  class="hidden"></div>
</main>
