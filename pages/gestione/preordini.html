<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Preordini</title>
    <link rel="stylesheet" href="../../assets/style/nav-style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }

        .toolbar {
            position: sticky; top: 56px; z-index: 20;
            background: white; border-bottom: 1px solid #e2e8f0;
            padding: 8px 14px; display: flex; align-items: center;
            gap: 6px; flex-wrap: wrap; box-shadow: 0 1px 3px rgba(0,0,0,.04);
            min-height: 52px;
        }

        /* ── TABLE WRAPPER ── */
        .tabella-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: calc(100vh - 140px);
            -webkit-overflow-scrolling: touch;
            padding-bottom: 80px;
        }

        /* ── TABLE ── */
        .tabella-preordini { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tabella-preordini thead { position: sticky; top: 0; z-index: 15; }
        .tabella-preordini td { padding: 2px 3px; border: 1px solid #e2e8f0; vertical-align: middle; }

        /* ── HEADER ROW 1: empori names & info cols ── */
        .th-emp {
            padding: 5px 6px; text-align: center;
            font-size: 12px; font-weight: 800; text-transform: uppercase;
            letter-spacing: .06em; white-space: nowrap;
            background: #1e293b; color: white; border: 1px solid #334155;
        }
        .th-info {
            background: #f8fafc; color: #475569;
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            letter-spacing: .04em; padding: 5px 6px; text-align: left;
            border: 1px solid #e2e8f0;
        }
        .th-tot {
            padding: 4px 5px; text-align: center; font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: .04em; white-space: nowrap;
            background: #1e293b; color: #64748b; border: 1px solid #334155;
        }
        .th-tot-ord  { background: #0f3d1e; color: #4ade80; }
        .th-tot-conf { background: #0f3d1e; color: #86efac; font-size: 8px; }
        .th-tot-vend { background: #1e293b; color: #64748b; }

        /* ── HEADER ROW 2: anni ── */
        .th-anno {
            padding: 4px 5px; text-align: center; font-size: 9px; font-weight: 700;
            border: 1px solid #475569; white-space: nowrap;
        }
        .th-anno-cor  { background: #334155; color: #e2e8f0; }
        .th-anno-prec { background: #475569; color: #94a3b8; }

        /* ── HEADER ROW 3: sub-labels ── */
        .th-sub {
            padding: 3px 4px; text-align: center; font-size: 8px; font-weight: 800;
            text-transform: uppercase; letter-spacing: .04em; white-space: nowrap;
            border: 1px solid #475569;
        }
        .th-sub-vend { background: #475569; color: #94a3b8; }
        .th-sub-ord  { background: #1a3a2a; color: #86efac; }

        /* ── STICKY LEFT COLS ── */
        .col-s0 { position: sticky; left: 0;     z-index: 2; }
        .col-s1 { position: sticky; left: 71px;  z-index: 2; }
        .col-s2 { position: sticky; left: 183px; z-index: 2; box-shadow: 2px 0 4px rgba(0,0,0,.07); }
        .tabella-preordini tbody .col-s0,
        .tabella-preordini tbody .col-s1,
        .tabella-preordini tbody .col-s2 { background: #fff; }
        .tabella-preordini thead .col-s0,
        .tabella-preordini thead .col-s1,
        .tabella-preordini thead .col-s2 { z-index: 16; }

        /* ── FORNITORE SEPARATOR ── */
        .tr-fornitore td {
            background: #1e293b; color: #fff; font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: .08em;
            padding: 6px 12px; cursor: pointer; user-select: none;
        }
        .tr-fornitore:hover td { background: #263549; }

        /* ── SUBTOTAL ── */
        .tr-subtotal td {
            background: #f1f5f9; font-size: 10px; font-weight: 700;
            color: #475569; padding: 3px 6px;
        }

        /* ── TFOOT ── */
        .tabella-preordini tfoot td {
            background: #1e293b; color: white; font-weight: 700; font-size: 12px; padding: 5px 8px;
        }

        /* ── QUANTITY CELLS (readonly) ── */
        .td-ro { background: #f8fafc; color: #94a3b8; text-align: center; font-size: 12px; font-family: 'DM Mono', monospace; min-width: 44px; }
        .td-vend-up   { background: #f0fdf4; color: #16A34A; font-weight: 600; text-align: center; font-size: 12px; font-family: 'DM Mono', monospace; min-width: 44px; }
        .td-vend-down { background: #fef2f2; color: #B5453A; font-weight: 600; text-align: center; font-size: 12px; font-family: 'DM Mono', monospace; min-width: 44px; }

        /* ── ORDINE CORRENTE CELL ── */
        .td-ord         { background: #fff;     text-align: center; min-width: 50px; }
        .td-ord.has-val { background: #f0fdf4; }
        .td-ord.inv-val { background: #fff7ed; }

        /* ── TOTALS ── */
        .td-tot-ord  { background: #f0fdf4; color: #16A34A; font-weight: 700; min-width: 54px; text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
        .td-tot-conf { background: #f0fdf4; color: #4ade80; font-weight: 600; min-width: 44px; text-align: right; font-family: 'DM Mono', monospace; font-size: 11px; }
        .td-tot-vend { background: #f8fafc; color: #94a3b8; min-width: 54px; text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
        .td-del { width: 26px; text-align: center; }

        /* ── INPUTS ── */
        .inp-r {
            width: 100%; border: none; background: transparent;
            font-family: 'Inter', sans-serif; font-size: 12px;
            padding: 2px 3px; outline: none;
        }
        .inp-r:focus { background: #eff6ff; border-radius: 2px; }
        .cella-ordine {
            width: 46px; border: none; background: transparent;
            font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
            text-align: center; padding: 2px 3px; outline: none;
            display: block; margin: 0 auto;
        }
        .cella-ordine:focus { background: #eff6ff; border-radius: 2px; outline: 2px solid #16A34A; outline-offset: -1px; }

        /* ── VALIDATION TOOLTIP ── */
        #qty-warn {
            position: fixed; z-index: 300; background: #1e293b; color: white;
            border-radius: 8px; padding: 10px 14px; font-size: 12px;
            font-family: 'Inter', sans-serif; box-shadow: 0 8px 24px rgba(0,0,0,.35);
            max-width: 290px; line-height: 1.5;
        }
        #qty-warn .warn-msg { color: #fbbf24; margin-bottom: 8px; font-weight: 600; font-size: 11px; }
        #qty-warn .warn-btns { display: flex; gap: 8px; }
        .btn-corr  { background: #16A34A; color: white; border: none; border-radius: 5px; padding: 4px 12px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .btn-forza { background: #475569; color: #94a3b8; border: none; border-radius: 5px; padding: 4px 12px; font-size: 11px; font-weight: 700; cursor: pointer; }

        /* ── BUTTONS ── */
        .btn-tb {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 700;
            cursor: pointer; border: 1px solid #e2e8f0; background: white; color: #374151;
            white-space: nowrap; transition: all .12s; font-family: 'Inter', sans-serif;
        }
        .btn-tb:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-tb.prim { background: #B5453A; color: white; border-color: #B5453A; }
        .btn-tb.prim:hover { background: #9e3f3f; }
        .btn-tb:disabled { opacity: .38; cursor: not-allowed; pointer-events: none; }

        .save-dot { font-size: 10px; color: #94a3b8; margin-left: 4px; min-width: 80px; }
        .save-dot.saving { color: #f59e0b; }
        .save-dot.saved  { color: #10b981; }
        .save-dot.err    { color: #ef4444; }

        /* ── MODALS ── */
        .modal-ov {
            position: fixed; inset: 0; background: rgba(0,0,0,.45);
            z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px;
        }
        .modal-box {
            background: white; border-radius: 12px; padding: 22px;
            width: 100%; max-width: 540px; max-height: 82vh;
            overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .modal-title { font-size: 15px; font-weight: 800; color: #1e293b; margin-bottom: 16px; }
        .flabel { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
        .finput {
            width: 100%; padding: 7px 10px; border: 1px solid #e2e8f0;
            border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif;
            outline: none; background: white;
        }
        .finput:focus { border-color: #B5453A; }
        .fgroup { margin-bottom: 11px; }

        /* ── SUMMARY ── */
        .summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .summary-table th { background: #1e293b; color: #94a3b8; padding: 6px 10px; font-size: 9px; font-weight: 800; text-transform: uppercase; text-align: left; letter-spacing: .05em; }
        .summary-table td { border-bottom: 1px solid #f1f5f9; padding: 5px 10px; }
        .summary-table tr:hover td { background: #f8fafc; }

        .hidden { display: none !important; }

        @media print {
            .toolbar, #m361-header, #m361-nav { display: none !important; }
            body { padding: 0 !important; }
            .tabella-preordini thead { position: static; }
            .col-s0, .col-s1, .col-s2 { position: static; }
        }
    </style>
</head>
<body>

<!-- ═══ VALIDATION TOOLTIP ════════════════════════════════════════════ -->
<div id="qty-warn" class="hidden" onclick="event.stopPropagation()">
    <div class="warn-msg" id="qty-warn-msg"></div>
    <div class="warn-btns">
        <button class="btn-corr"  onclick="correggiQty()">Correggi</button>
        <button class="btn-forza" onclick="forzaQty()">Forza</button>
    </div>
</div>

<!-- ═══ TOOLBAR ══════════════════════════════════════════════════════ -->
<div class="toolbar">
    <select id="sel-campagna" onchange="selezionaCampagna(this.value)"
        style="padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-weight:700;color:#374151;background:white;outline:none;max-width:230px;cursor:pointer">
        <option value="">— Seleziona campagna —</option>
    </select>
    <span id="save-dot" class="save-dot"></span>
    <div style="flex:1;min-width:8px"></div>
    <button class="btn-tb prim" onclick="mostraNuovaCampagna()">+ Campagna</button>
    <button class="btn-tb" id="btn-importa" onclick="mostraImporta()" disabled>↓ Importa</button>
    <button class="btn-tb" id="btn-add-prod" onclick="mostraAggiungiProdotto()" disabled>+ Prodotto</button>
    <button class="btn-tb" id="btn-riepilogo" onclick="toggleRiepilogo()" disabled>≡ Riepilogo</button>
    <button class="btn-tb" id="btn-csv" onclick="exportCSV()" disabled>⬇ CSV</button>
    <button class="btn-tb" id="btn-print" onclick="window.print()" disabled>⎙ Stampa</button>
</div>

<!-- ═══ EMPTY STATE ══════════════════════════════════════════════════ -->
<div id="empty-state" style="text-align:center;padding:80px 24px;color:#94a3b8">
    <div style="font-size:44px;margin-bottom:14px">📋</div>
    <div style="font-size:15px;font-weight:700;color:#475569;margin-bottom:6px">Nessuna campagna selezionata</div>
    <div style="font-size:13px">Seleziona una campagna o creane una nuova</div>
</div>

<!-- ═══ TABLE ════════════════════════════════════════════════════════ -->
<div id="table-wrap" class="hidden">
    <div class="tabella-wrapper">
        <table class="tabella-preordini">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
            <tfoot id="tfoot"></tfoot>
        </table>
    </div>
</div>

<!-- ═══ RIEPILOGO ════════════════════════════════════════════════════ -->
<div id="riepilogo-wrap" class="hidden" style="padding:20px;max-width:900px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <h3 style="font-size:14px;font-weight:800;color:#1e293b">Riepilogo per Categoria</h3>
        <button class="btn-tb" onclick="toggleRiepilogo()">← Torna alla tabella</button>
    </div>
    <table class="summary-table" id="summary-table"></table>
</div>

<!-- ═══ MODAL NUOVA CAMPAGNA ═════════════════════════════════════════ -->
<div id="modal-camp" class="modal-ov hidden" onclick="chiudi('modal-camp')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">Nuova Campagna Preordini</div>
        <div class="fgroup">
            <label class="flabel">Nome campagna *</label>
            <input id="mc-nome" class="finput" type="text" placeholder="es. CASA 2027 Primavera/Estate">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="fgroup">
                <label class="flabel">Anno *</label>
                <input id="mc-anno" class="finput" type="number" placeholder="2027">
            </div>
            <div class="fgroup">
                <label class="flabel">Stagione</label>
                <input id="mc-stagione" class="finput" type="text" placeholder="P/E 2027">
            </div>
        </div>
        <div class="fgroup">
            <label class="flabel">Empori partecipanti</label>
            <div id="mc-empori-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px"></div>
            <button type="button" class="btn-tb" onclick="addEmpRow()" style="font-size:11px;padding:4px 10px">+ Emporio</button>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid #f1f5f9">
            <button class="btn-tb" onclick="chiudi('modal-camp')">Annulla</button>
            <button class="btn-tb prim" onclick="creaCampagna()">Crea Campagna</button>
        </div>
    </div>
</div>

<!-- ═══ MODAL AGGIUNGI PRODOTTO ══════════════════════════════════════ -->
<div id="modal-prod" class="modal-ov hidden" onclick="chiudi('modal-prod')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">Aggiungi Prodotto</div>
        <div class="fgroup">
            <label class="flabel">Fornitore *</label>
            <select id="mp-forn-sel" class="finput" onchange="onFornSelChange(this.value)">
                <option value="">— Seleziona fornitore —</option>
            </select>
            <input id="mp-forn-new" class="finput" type="text" placeholder="Nome nuovo fornitore" style="display:none;margin-top:6px">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="fgroup">
                <label class="flabel">Categoria</label>
                <input id="mp-cat" class="finput" type="text" list="dl-cat" placeholder="es. Tazze">
            </div>
            <div class="fgroup">
                <label class="flabel">Codice</label>
                <input id="mp-cod" class="finput" type="text" placeholder="es. RM001">
            </div>
        </div>
        <div class="fgroup">
            <label class="flabel">Prodotto *</label>
            <input id="mp-prod" class="finput" type="text" placeholder="Descrizione prodotto">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="fgroup">
                <label class="flabel">Confezione</label>
                <input id="mp-conf" class="finput" type="number" placeholder="6" min="1">
            </div>
            <div class="fgroup">
                <label class="flabel">PVP corrente €</label>
                <input id="mp-pvp" class="finput" type="number" step="0.01" placeholder="0.00">
            </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid #f1f5f9">
            <button class="btn-tb" onclick="chiudi('modal-prod')">Annulla</button>
            <button class="btn-tb prim" onclick="salvaAggiungiProdotto()">Aggiungi</button>
        </div>
        <datalist id="dl-cat"></datalist>
    </div>
</div>

<!-- ═══ MODAL IMPORTA ════════════════════════════════════════════════ -->
<div id="modal-importa" class="modal-ov hidden" onclick="chiudi('modal-importa')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">Importa da Campagna Precedente</div>
        <p style="font-size:12px;color:#64748b;margin-bottom:16px;line-height:1.5">
            I prodotti vengono copiati. Il <strong>ordine_corrente</strong> sorgente diventa
            <strong>venduto_precedente</strong> nella nuova campagna.
        </p>
        <div class="fgroup">
            <label class="flabel">Campagna sorgente</label>
            <select id="imp-sel" class="finput"><option value="">— Seleziona —</option></select>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid #f1f5f9">
            <button class="btn-tb" onclick="chiudi('modal-importa')">Annulla</button>
            <button class="btn-tb prim" onclick="eseguiImporta()">Importa</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
const DB = supabase.createClient(SUPA_URL, SUPA_KEY);

let campagnaCorrente = null;
let emporiAttivi   = [];
let righe          = [];
let quantitaMap    = {};
let campagneList   = [];
let riepilogoVis   = false;
const saveTimers   = {};
const insertLocks  = {};
let pendingValidation = null;

// ── INIT ──────────────────────────────────────────────────────────────
async function init() { await loadCampagne(); }

async function loadCampagne() {
    const { data } = await DB.from('preordini_campagne').select('*').order('created_at', { ascending: false });
    campagneList = data || [];
    const sel = document.getElementById('sel-campagna');
    sel.innerHTML = '<option value="">— Seleziona campagna —</option>';
    campagneList.forEach(c => {
        const o = document.createElement('option');
        o.value = c.id;
        o.textContent = c.nome + ' (' + c.anno + (c.stagione ? ' · ' + c.stagione : '') + ')';
        sel.appendChild(o);
    });
}

async function selezionaCampagna(id) {
    const btns = ['btn-importa','btn-add-prod','btn-riepilogo','btn-csv','btn-print'];
    if (!id) {
        campagnaCorrente = null; emporiAttivi = []; righe = []; quantitaMap = {};
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('table-wrap').classList.add('hidden');
        document.getElementById('riepilogo-wrap').classList.add('hidden');
        btns.forEach(b => document.getElementById(b).disabled = true);
        return;
    }
    setSave('Caricamento…', 'saving');
    const [{ data: camp }, { data: emps }, { data: rigs }] = await Promise.all([
        DB.from('preordini_campagne').select('*').eq('id', id).single(),
        DB.from('preordini_empori').select('*').eq('campagna_id', id).order('ordine_visualizzazione'),
        DB.from('preordini_righe').select('*').eq('campagna_id', id).order('ordine_riga'),
    ]);
    campagnaCorrente = camp;
    emporiAttivi = emps || [];
    righe = rigs || [];
    quantitaMap = {};
    if (righe.length > 0) {
        const ids = righe.map(r => r.id);
        const { data: qtys } = await DB.from('preordini_quantita').select('*').in('riga_id', ids);
        (qtys || []).forEach(q => {
            if (!quantitaMap[q.riga_id]) quantitaMap[q.riga_id] = {};
            quantitaMap[q.riga_id][q.emporio_codice] = {
                id: q.id,
                venduto_precedente: parseFloat(q.venduto_precedente) || 0,
                ordine_precedente:  parseFloat(q.ordine_precedente)  || 0,
                venduto_corrente:   parseFloat(q.venduto_corrente)   || 0,
                ordine_corrente:    parseFloat(q.ordine_corrente)    || 0,
            };
        });
    }
    document.getElementById('empty-state').classList.add('hidden');
    if (riepilogoVis) {
        document.getElementById('table-wrap').classList.add('hidden');
        document.getElementById('riepilogo-wrap').classList.remove('hidden');
    } else {
        document.getElementById('table-wrap').classList.remove('hidden');
        document.getElementById('riepilogo-wrap').classList.add('hidden');
    }
    btns.forEach(b => document.getElementById(b).disabled = false);
    renderTable();
    clearSave();
}

// ── RENDER TABLE ──────────────────────────────────────────────────────
function renderTable() {
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    const tfoot = document.getElementById('tfoot');
    const nEmp  = emporiAttivi.length;
    // 5 left + 4×emp + 4 right (TOT_ORD, TOT_CONF, TOT_VEND, Del)
    const totalCols = 5 + nEmp * 4 + 4;
    const anno = campagnaCorrente?.anno || new Date().getFullYear();

    // ── Header row 1: fixed (rowspan=3) + empori (colspan=4) + tot (rowspan=3) ──
    let h1 = '<tr>';
    h1 += '<th rowspan="3" class="th-info col-s0" style="text-align:left;width:70px;min-width:70px">Codice</th>';
    h1 += '<th rowspan="3" class="th-info col-s1" style="text-align:left;width:110px;min-width:110px">Categoria</th>';
    h1 += '<th rowspan="3" class="th-info col-s2" style="text-align:left;min-width:180px">Prodotto</th>';
    h1 += '<th rowspan="3" class="th-info" style="text-align:center;width:46px">Conf</th>';
    h1 += '<th rowspan="3" class="th-info" style="text-align:center;width:56px">PVP</th>';

    h1 += '<th rowspan="3" class="th-tot th-tot-vend">TOT<br>VEND</th>';
    h1 += '<th rowspan="3" class="th-tot" style="min-width:26px;background:#1e293b"></th>';
    h1 += '</tr>';

    // ── Header row 2: anni (anno cor | anno prec per emporio) ──
    let h2 = '<tr>';
    emporiAttivi.forEach(() => {
        h2 += '<th colspan="2" class="th-anno th-anno-cor">' + anno + '</th>';
        h2 += '<th colspan="2" class="th-anno th-anno-prec">' + (anno - 1) + '</th>';
    });
    h2 += '</tr>';

    // ── Header row 3: sub-col labels ──
    let h3 = '<tr>';
    emporiAttivi.forEach(() => {
        h3 += '<th class="th-sub th-sub-vend">VEND</th>';
        h3 += '<th class="th-sub th-sub-ord">ORD</th>';
        h3 += '<th class="th-sub th-sub-vend">VEND</th>';
        h3 += '<th class="th-sub th-sub-ord">ORD</th>';
    });
    h3 += '</tr>';
    thead.innerHTML = h1 + h2 + h3;

    // ── Body ──
    const fornitori = [...new Set(righe.map(r => r.fornitore || '—'))];
    let html = '';
    let grandOrd = 0, grandVend = 0;

    fornitori.forEach((forn, fi) => {
        const grp = righe.filter(r => (r.fornitore || '—') === forn);
        const fk  = 'fk' + fi;

        html += '<tr class="tr-fornitore" onclick="toggleForn(\'' + fk + '\')">' +
            '<td colspan="' + totalCols + '">' +
            '<span id="arr-' + fk + '">▼</span> ' + esc(forn) +
            ' <span style="font-size:10px;font-weight:400;opacity:.55">(' + grp.length + ')</span>' +
            '</td></tr>';

        let subOrd = 0, subVend = 0;
        const subEmpOrd = {}, subEmpVend = {};
        emporiAttivi.forEach(e => { subEmpOrd[e.codice] = 0; subEmpVend[e.codice] = 0; });

        grp.forEach(riga => {
            const q    = quantitaMap[riga.id] || {};
            const conf = parseFloat(riga.conf) || 0;
            let rowOrd = 0, rowVend = 0;
            let empCells = '';

            emporiAttivi.forEach((emp, ei) => {
                const qt  = q[emp.codice] || {};
                const vc  = parseFloat(qt.venduto_corrente)   || 0;
                const ord = parseFloat(qt.ordine_corrente)    || 0;
                const vp  = parseFloat(qt.venduto_precedente) || 0;
                const op  = parseFloat(qt.ordine_precedente)  || 0;
                rowOrd  += ord; rowVend += vp;
                subEmpOrd[emp.codice]  += ord;
                subEmpVend[emp.codice] += vp;
                const ec  = esc(emp.codice);

                // VEND.C: color based on comparison with VEND.P
                let vcCls = 'td-ro';
                if (vc > 0 || vp > 0) {
                    if      (vc > vp) vcCls = 'td-vend-up';
                    else if (vc < vp) vcCls = 'td-vend-down';
                }

                // ORD.C cell state
                let ordCls = 'td-ord';
                if (ord > 0) ordCls = (conf > 0 && ord % conf !== 0) ? 'td-ord inv-val' : 'td-ord has-val';

                // Anno corrente: VEND.C | ORD.C
                empCells += '<td class="' + vcCls + '">' + (vc || '') + '</td>';
                empCells += '<td class="' + ordCls + '" id="td-oc-' + riga.id + '-' + ec + '">' +
                    '<input class="cella-ordine" type="number" step="1" min="0" ' +
                    'value="' + (ord || '') + '" ' +
                    'data-rid="' + riga.id + '" data-ei="' + ei + '" ' +
                    'oninput="onOrd(\'' + riga.id + '\',\'' + ec + '\',this,' + conf + ')" ' +
                    'onkeydown="onOrdKey(event,this)" onfocus="this.select()"></td>';
                // Anno precedente: VEND.P | ORD.P
                empCells += '<td class="td-ro">' + (vp || '') + '</td>';
                empCells += '<td class="td-ro">' + (op || '') + '</td>';
            });
            subOrd += rowOrd; subVend += rowVend;

            const totConf = conf > 0 && rowOrd > 0 ? Math.ceil(rowOrd / conf) : '';

            html += '<tr class="product-row" data-fk="' + fk + '" data-riga-id="' + riga.id + '">';
            html += '<td class="col-s0" style="color:#94a3b8">' +
                '<input class="inp-r" type="text" value="' + esc(riga.codice || '') + '" ' +
                'onchange="onRF(\'' + riga.id + '\',\'codice\',this.value)" style="width:64px;color:#94a3b8"></td>';
            html += '<td class="col-s1">' +
                '<input class="inp-r" type="text" value="' + esc(riga.categoria || '') + '" list="dl-cat" ' +
                'onchange="onRF(\'' + riga.id + '\',\'categoria\',this.value)" style="width:104px"></td>';
            html += '<td class="col-s2" style="font-size:13px;font-weight:500;min-width:180px">' +
                '<input class="inp-r" type="text" value="' + esc(riga.prodotto || '') + '" ' +
                'onchange="onRF(\'' + riga.id + '\',\'prodotto\',this.value)" style="width:175px;font-weight:500"></td>';
            html += '<td style="text-align:center">' +
                '<input class="inp-r" type="number" value="' + (riga.conf || '') + '" ' +
                'onchange="onRF(\'' + riga.id + '\',\'conf\',this.value)" style="width:42px;text-align:center"></td>';
            html += '<td style="text-align:center">' +
                '<input class="inp-r" type="number" step="0.01" value="' + (riga.pvp_corrente || '') + '" ' +
                'onchange="onRF(\'' + riga.id + '\',\'pvp_corrente\',this.value)" style="width:52px;text-align:center"></td>';
            html += empCells;
            html += '<td class="td-tot-ord"  id="tot-ord-'  + riga.id + '">' + (rowOrd  || '') + '</td>';
            html += '<td class="td-tot-conf" id="tot-conf-' + riga.id + '">' + totConf + '</td>';
            html += '<td class="td-tot-vend" id="tot-vend-' + riga.id + '">' + (rowVend || '') + '</td>';
            html += '<td class="td-del" data-fk="' + fk + '">' +
                '<button onclick="eliminaRiga(\'' + riga.id + '\')" ' +
                'style="background:none;border:none;cursor:pointer;color:#fca5a5;font-size:14px;line-height:1;padding:2px">×</button></td>';
            html += '</tr>';
        });

        grandOrd += subOrd; grandVend += subVend;

        // ── Subtotal per fornitore ──
        html += '<tr class="tr-subtotal" data-fk="' + fk + '">' +
            '<td colspan="5" style="text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:.04em">TOTALE ' + esc(forn) + '</td>';
        emporiAttivi.forEach(emp => {
            html += '<td style="text-align:center;color:#94a3b8;font-family:\'DM Mono\',monospace">' + (subEmpVend[emp.codice] || '') + '</td>';
            html += '<td style="text-align:center;font-family:\'DM Mono\',monospace;color:#16A34A;font-weight:700">' + (subEmpOrd[emp.codice] || '') + '</td>';
            html += '<td></td><td></td>';
        });
        html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:#16A34A;background:#f0fdf4">' + (subOrd || '') + '</td>';
        html += '<td style="background:#f0fdf4"></td>';
        html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:#94a3b8;background:#f8fafc">' + (subVend || '') + '</td>';
        html += '<td></td></tr>';
    });

    tbody.innerHTML = html;

    // ── Grand total ──
    let foot = '<tr><td colspan="5" style="text-align:right;font-size:10px;letter-spacing:.06em">TOTALE GENERALE →</td>';
    emporiAttivi.forEach(emp => {
        const gO = righe.reduce((s,r) => s + (parseFloat(quantitaMap[r.id]?.[emp.codice]?.ordine_corrente)    || 0), 0);
        const gV = righe.reduce((s,r) => s + (parseFloat(quantitaMap[r.id]?.[emp.codice]?.venduto_precedente) || 0), 0);
        foot += '<td style="text-align:center;color:#94a3b8;font-family:\'DM Mono\',monospace;font-size:11px">' + (gV || '') + '</td>';
        foot += '<td style="text-align:center;color:#4ade80;font-family:\'DM Mono\',monospace;font-weight:700">' + (gO || '') + '</td>';
        foot += '<td></td><td></td>';
    });
    foot += '<td style="text-align:right;color:#4ade80;font-family:\'DM Mono\',monospace;font-size:13px;background:#0f3d1e">' + (grandOrd || '') + '</td>';
    foot += '<td style="background:#0f3d1e"></td>';
    foot += '<td style="text-align:right;color:#94a3b8;font-family:\'DM Mono\',monospace">' + (grandVend || '') + '</td>';
    foot += '<td></td></tr>';
    tfoot.innerHTML = foot;

    aggiornaDatalists();
}

// ── COLLAPSE/EXPAND FORNITORE ─────────────────────────────────────────
function toggleForn(fk) {
    const rows  = document.querySelectorAll('[data-fk="' + fk + '"]');
    const arrow = document.getElementById('arr-' + fk);
    const isHidden = rows.length > 0 && rows[0].style.display === 'none';
    rows.forEach(r => r.style.display = isHidden ? '' : 'none');
    if (arrow) arrow.textContent = isHidden ? '▼' : '▶';
}

// ── VALIDATION ────────────────────────────────────────────────────────
function validaQuantita(valore, conf) {
    if (valore === 0 || !conf || conf <= 0) return { valido: true };
    if (valore % conf === 0) return { valido: true };
    const inf = Math.floor(valore / conf) * conf || conf;
    const sup = Math.ceil(valore / conf) * conf;
    return { valido: false, inf, sup };
}

function showQtyWarn(input, val, conf, rigaId, empCode) {
    const res = validaQuantita(val, conf);
    if (res.valido) { hideQtyWarn(); return; }
    pendingValidation = { rigaId, empCode, input, val, conf, inf: res.inf, sup: res.sup };
    document.getElementById('qty-warn-msg').textContent =
        val + ' non è multiplo di ' + conf + '. Suggerito: ' + res.inf + ' o ' + res.sup;
    const warn = document.getElementById('qty-warn');
    const rect = input.getBoundingClientRect();
    warn.style.top  = (rect.bottom + 6) + 'px';
    warn.style.left = Math.min(rect.left, window.innerWidth - 310) + 'px';
    warn.classList.remove('hidden');
}

function hideQtyWarn() {
    document.getElementById('qty-warn').classList.add('hidden');
    pendingValidation = null;
}

function correggiQty() {
    if (!pendingValidation) return;
    const { input, rigaId, empCode, conf, inf, sup, val } = pendingValidation;
    const corrected = Math.abs(val - inf) <= Math.abs(val - sup) ? inf : sup;
    input.value = corrected;
    hideQtyWarn();
    commitOrd(rigaId, empCode, corrected, input, conf);
}

function forzaQty() {
    if (!pendingValidation) return;
    const { rigaId, empCode, val, input, conf } = pendingValidation;
    hideQtyWarn();
    commitOrd(rigaId, empCode, val, input, conf);
}

// ── ORDINE CORRENTE ───────────────────────────────────────────────────
function onOrd(rigaId, empCode, input, conf) {
    hideQtyWarn();
    const val = parseFloat(input.value) || 0;
    clearTimeout(saveTimers['warn-' + rigaId + '-' + empCode]);
    if (val > 0 && conf > 0 && val % conf !== 0) {
        saveTimers['warn-' + rigaId + '-' + empCode] = setTimeout(
            () => showQtyWarn(input, val, conf, rigaId, empCode), 600);
    } else {
        commitOrd(rigaId, empCode, val, input, conf);
    }
}

function commitOrd(rigaId, empCode, val, input, conf) {
    if (!quantitaMap[rigaId]) quantitaMap[rigaId] = {};
    if (!quantitaMap[rigaId][empCode]) quantitaMap[rigaId][empCode] = {
        venduto_precedente: 0, ordine_precedente: 0, venduto_corrente: 0, ordine_corrente: 0
    };
    quantitaMap[rigaId][empCode].ordine_corrente = val;

    const td = document.getElementById('td-oc-' + rigaId + '-' + empCode);
    if (td) {
        if (val > 0) td.className = (conf > 0 && val % conf !== 0) ? 'td-ord inv-val' : 'td-ord has-val';
        else td.className = 'td-ord';
    }

    updateRowTotals(rigaId);
    clearTimeout(saveTimers['ord-' + rigaId + '-' + empCode]);
    setSave('salvataggio…', 'saving');
    saveTimers['ord-' + rigaId + '-' + empCode] = setTimeout(() => saveQty(rigaId, empCode), 800);
}

// ── KEYBOARD NAV (Excel-like) ─────────────────────────────────────────
function onOrdKey(e, input) {
    if (e.key === 'Escape') { hideQtyWarn(); input.blur(); return; }
    if (e.key !== 'Tab' && e.key !== 'Enter') return;
    e.preventDefault();
    hideQtyWarn();
    const rid  = input.dataset.rid;
    const ei   = parseInt(input.dataset.ei);
    const nEmp = emporiAttivi.length;
    if (e.key === 'Tab') {
        if (e.shiftKey) navigateCell(rid, ei - 1 >= 0 ? ei - 1 : nEmp - 1, ei - 1 >= 0 ? 0 : -1);
        else            navigateCell(rid, ei + 1 < nEmp ? ei + 1 : 0,       ei + 1 < nEmp ? 0 :  1);
    } else {
        navigateCell(rid, ei, 1);
    }
}

function navigateCell(currentRid, targetEi, rowDelta) {
    let targetRid = currentRid;
    if (rowDelta !== 0) {
        const idx = righe.findIndex(r => r.id === currentRid);
        const next = idx + rowDelta;
        if (next < 0 || next >= righe.length) return;
        targetRid = righe[next].id;
    }
    const t = document.querySelector('[data-rid="' + targetRid + '"][data-ei="' + targetEi + '"]');
    if (t) { t.focus(); t.select(); }
}

// ── ROW TOTALS ────────────────────────────────────────────────────────
function updateRowTotals(rigaId) {
    const riga = righe.find(r => r.id === rigaId);
    const conf = parseFloat(riga?.conf) || 0;
    let totOrd = 0, totVend = 0;
    emporiAttivi.forEach(emp => {
        const q = quantitaMap[rigaId]?.[emp.codice] || {};
        totOrd  += parseFloat(q.ordine_corrente)    || 0;
        totVend += parseFloat(q.venduto_precedente) || 0;
    });
    const totConf = conf > 0 && totOrd > 0 ? Math.ceil(totOrd / conf) : '';
    const eO = document.getElementById('tot-ord-'  + rigaId);
    const eC = document.getElementById('tot-conf-' + rigaId);
    const eV = document.getElementById('tot-vend-' + rigaId);
    if (eO) eO.textContent = totOrd  || '';
    if (eC) eC.textContent = totConf;
    if (eV) eV.textContent = totVend || '';
}

async function saveQty(rigaId, empCode) {
    const key = rigaId + '-' + empCode;
    if (insertLocks[key]) return;
    const q = quantitaMap[rigaId]?.[empCode];
    if (!q) return;
    let error;
    if (q.id) {
        ({ error } = await DB.from('preordini_quantita').update({
            ordine_corrente: q.ordine_corrente || 0,
        }).eq('id', q.id));
    } else {
        insertLocks[key] = true;
        const { data, error: e } = await DB.from('preordini_quantita').insert({
            riga_id: rigaId, emporio_codice: empCode,
            venduto_precedente: q.venduto_precedente || 0,
            ordine_precedente:  q.ordine_precedente  || 0,
            venduto_corrente:   q.venduto_corrente   || 0,
            ordine_corrente:    q.ordine_corrente    || 0,
        }).select().single();
        insertLocks[key] = false;
        error = e;
        if (data) quantitaMap[rigaId][empCode].id = data.id;
    }
    if (error) setSave('errore!', 'err');
    else { setSave('salvato ✓', 'saved'); setTimeout(clearSave, 2000); }
}

// ── RIGA FIELD CHANGE ────────────────────────────────────────────────
function onRF(rigaId, field, value) {
    const riga = righe.find(r => r.id === rigaId);
    if (!riga) return;
    riga[field] = value;
    if (field === 'conf') updateRowTotals(rigaId);
    clearTimeout(saveTimers['riga-' + rigaId]);
    setSave('salvataggio…', 'saving');
    saveTimers['riga-' + rigaId] = setTimeout(() => saveRiga(rigaId), 800);
}

async function saveRiga(rigaId) {
    const riga = righe.find(r => r.id === rigaId);
    if (!riga) return;
    const { error } = await DB.from('preordini_righe').update({
        fornitore: riga.fornitore || null,
        codice: riga.codice || null,
        categoria: riga.categoria || null,
        prodotto: riga.prodotto,
        conf: riga.conf || null,
        pvp_corrente: riga.pvp_corrente || null,
    }).eq('id', rigaId);
    if (error) setSave('errore!', 'err');
    else { setSave('salvato ✓', 'saved'); setTimeout(clearSave, 2000); }
}

async function eliminaRiga(rigaId) {
    if (!confirm('Eliminare questa riga prodotto?')) return;
    const { error } = await DB.from('preordini_righe').delete().eq('id', rigaId);
    if (error) { alert('Errore: ' + error.message); return; }
    righe = righe.filter(r => r.id !== rigaId);
    delete quantitaMap[rigaId];
    renderTable();
}

function mostraNuovaCampagna() {
    document.getElementById('mc-nome').value = '';
    document.getElementById('mc-anno').value = new Date().getFullYear() + 1;
    document.getElementById('mc-stagione').value = '';
    const list = document.getElementById('mc-empori-list');

}

function addEmpRow() {
    const list = document.getElementById('mc-empori-list');
    const d = document.createElement('div');
    d.style.cssText = 'display:flex;gap:6px;align-items:center';
    d.innerHTML = '<input type="text" placeholder="Nome emporio (es. Cremona)" class="finput" style="flex:1" data-r="nome">' +
        '<button type="button" onclick="this.parentElement.remove()" ' +
        'style="color:#ef4444;background:none;border:none;cursor:pointer;font-size:18px;line-height:1;padding:0 4px">×</button>';

async function creaCampagna() {
    const nome     = document.getElementById('mc-nome').value.trim();
    const anno     = parseInt(document.getElementById('mc-anno').value);
    const stagione = document.getElementById('mc-stagione').value.trim();
    if (!nome || !anno) { alert('Nome e Anno sono obbligatori.'); return; }
    const empori = [];
    document.querySelectorAll('#mc-empori-list > div').forEach((row, i) => {
        const nomeEmp = row.querySelector('[data-r="nome"]').value.trim();
        if (nomeEmp) {
            const codice = nomeEmp.toUpperCase().replace(/\s+/g, '_').slice(0, 20);
            empori.push({ codice, nome: nomeEmp, ordine_visualizzazione: i });
        }
    });
    if (empori.length === 0) { alert('Aggiungi almeno un emporio.'); return; }
    const { data: camp, error: e1 } = await DB.from('preordini_campagne')
        .insert({ nome, anno, stagione: stagione || null }).select().single();
    if (e1) { alert('Errore: ' + e1.message); return; }
    const { error: e2 } = await DB.from('preordini_empori')
        .insert(empori.map(e => ({ ...e, campagna_id: camp.id, attivo: true })));
    if (e2) { alert('Errore empori: ' + e2.message); return; }
    chiudi('modal-camp');
    await loadCampagne();
    document.getElementById('sel-campagna').value = camp.id;
    await selezionaCampagna(camp.id);
}

// ── AGGIUNGI PRODOTTO ─────────────────────────────────────────────────
function mostraAggiungiProdotto() {
    const forniList = [...new Set(righe.map(r => r.fornitore).filter(Boolean))].sort();
    const sel = document.getElementById('mp-forn-sel');
    sel.innerHTML = '<option value="">— Seleziona fornitore —</option>';
    forniList.forEach(f => {
        const o = document.createElement('option');
        o.value = f; o.textContent = f; sel.appendChild(o);
    });
    const o = document.createElement('option');
    o.value = '__nuovo__'; o.textContent = '+ Nuovo fornitore…'; sel.appendChild(o);
    document.getElementById('mp-forn-new').style.display = 'none';
    document.getElementById('mp-forn-new').value = '';
    ['mp-cat','mp-cod','mp-prod','mp-conf','mp-pvp'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('modal-prod').classList.remove('hidden');
}

function onFornSelChange(v) {
    const inp = document.getElementById('mp-forn-new');
    inp.style.display = v === '__nuovo__' ? 'block' : 'none';
    if (v !== '__nuovo__') inp.value = '';
}

async function salvaAggiungiProdotto() {
    const prodotto = document.getElementById('mp-prod').value.trim();
    if (!prodotto) { alert('Il campo Prodotto è obbligatorio.'); return; }
    const selVal    = document.getElementById('mp-forn-sel').value;
    const fornitore = selVal === '__nuovo__'
        ? document.getElementById('mp-forn-new').value.trim()
        : selVal;
    if (!fornitore) { alert('Seleziona o inserisci il fornitore.'); return; }
    const maxOrd = righe.length > 0 ? Math.max(...righe.map(r => r.ordine_riga || 0)) + 1 : 0;
    const record = {
        campagna_id: campagnaCorrente.id,
        fornitore,
        codice: document.getElementById('mp-cod').value.trim() || null,
        categoria: document.getElementById('mp-cat').value.trim() || null,
        prodotto,
        conf: parseFloat(document.getElementById('mp-conf').value) || null,
        pvp_corrente: parseFloat(document.getElementById('mp-pvp').value) || null,
        ordine_riga: maxOrd,
    };
    const { data, error } = await DB.from('preordini_righe').insert(record).select().single();
    if (error) { alert('Errore: ' + error.message); return; }
    righe.push(data);
    chiudi('modal-prod');
    renderTable();
}

}

async function eseguiImporta() {
    const sourceId = document.getElementById('imp-sel').value;
    if (!sourceId) { alert('Seleziona una campagna sorgente.'); return; }
    if (!confirm('Importare i prodotti? Le righe esistenti NON verranno cancellate.')) return;
    const { data: srcRighe, error: e1 } = await DB.from('preordini_righe').select('*').eq('campagna_id', sourceId).order('ordine_riga');
    if (e1) { alert('Errore: ' + e1.message); return; }
    if (!srcRighe?.length) { alert('Nessun prodotto nella campagna sorgente.'); return; }
    const { data: srcQtys } = await DB.from('preordini_quantita').select('*').in('riga_id', srcRighe.map(r => r.id));
    const destCodici = new Set(emporiAttivi.map(e => e.codice));
    const maxOrd = righe.length > 0 ? Math.max(...righe.map(r => r.ordine_riga || 0)) + 1 : 0;
    const nuoveRighe = srcRighe.map((r, i) => ({
        campagna_id: campagnaCorrente.id,
        fornitore: r.fornitore, codice: r.codice, categoria: r.categoria,
        prodotto: r.prodotto, conf: r.conf,
        pvp_corrente: r.pvp_corrente, pvp_precedente: r.pvp_precedente,
        ordine_riga: maxOrd + i,
    }));
    const { data: inserted, error: e2 } = await DB.from('preordini_righe').insert(nuoveRighe).select();
    if (e2) { alert('Errore righe: ' + e2.message); return; }
    const idMap = {};
    srcRighe.forEach((r, i) => { idMap[r.id] = inserted[i].id; });
    const qtysToInsert = (srcQtys || [])
        .filter(q => destCodici.has(q.emporio_codice) && idMap[q.riga_id])
        .map(q => ({
            riga_id: idMap[q.riga_id],
            emporio_codice: q.emporio_codice,
            venduto_precedente: parseFloat(q.ordine_corrente) || 0,
            ordine_precedente: 0, venduto_corrente: 0, ordine_corrente: 0,
        }));
    if (qtysToInsert.length > 0) await DB.from('preordini_quantita').insert(qtysToInsert);
    chiudi('modal-importa');
    await selezionaCampagna(campagnaCorrente.id);
}

// ── RIEPILOGO ─────────────────────────────────────────────────────────
function toggleRiepilogo() {
    riepilogoVis = !riepilogoVis;
    document.getElementById('table-wrap').classList.toggle('hidden', riepilogoVis);
    document.getElementById('riepilogo-wrap').classList.toggle('hidden', !riepilogoVis);
    if (riepilogoVis) renderRiepilogo();
}

function renderRiepilogo() {
    const categorie = [...new Set(righe.map(r => r.categoria || '—'))].sort();
    let html = '<thead><tr><th>Categoria</th><th style="text-align:right">VEND.PREC</th>' +
        '<th style="text-align:right">ORD.COR</th><th style="text-align:right">Δ%</th>';
    emporiAttivi.forEach(e => { html += '<th style="text-align:right">' + esc(e.nome) + '</th>'; });
    html += '</tr></thead><tbody>';
    let gV = 0, gO = 0;
    categorie.forEach(cat => {
        const grp = righe.filter(r => (r.categoria || '—') === cat);
        let tV = 0, tO = 0; const empO = {};
        grp.forEach(r => {
            emporiAttivi.forEach(emp => {
                const q = quantitaMap[r.id]?.[emp.codice] || {};
                tV += parseFloat(q.venduto_precedente) || 0;
                tO += parseFloat(q.ordine_corrente)    || 0;
                empO[emp.codice] = (empO[emp.codice] || 0) + (parseFloat(q.ordine_corrente) || 0);
            });
        });
        gV += tV; gO += tO;
        const delta = tV > 0 ? ((tO - tV) / tV * 100).toFixed(1) : null;
        const dCol  = delta === null ? '#94a3b8' : (parseFloat(delta) >= 0 ? '#15803d' : '#dc2626');
        html += '<tr><td style="font-weight:600">' + esc(cat) + '</td>';
        html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:#64748b">' + (tV || '—') + '</td>';
        html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:#16A34A;font-weight:700">' + (tO || '—') + '</td>';
        html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:' + dCol + ';font-weight:600">' + (delta !== null ? delta + '%' : '—') + '</td>';
        emporiAttivi.forEach(emp => {
            html += '<td style="text-align:right;font-family:\'DM Mono\',monospace">' + (empO[emp.codice] || '') + '</td>';
        });
        html += '</tr>';
    });
    const gDelta = gV > 0 ? ((gO - gV) / gV * 100).toFixed(1) : null;
    const gdCol  = gDelta === null ? '#94a3b8' : (parseFloat(gDelta) >= 0 ? '#4ade80' : '#fca5a5');
    html += '<tr style="background:#1e293b;color:white;font-weight:700"><td>TOTALE</td>';
    html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:#94a3b8">' + (gV || '—') + '</td>';
    html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:#4ade80">' + (gO || '—') + '</td>';
    html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:' + gdCol + '">' + (gDelta !== null ? gDelta + '%' : '—') + '</td>';
    emporiAttivi.forEach(emp => {
        const t = righe.reduce((s,r) => s + (parseFloat(quantitaMap[r.id]?.[emp.codice]?.ordine_corrente) || 0), 0);
        html += '<td style="text-align:right;font-family:\'DM Mono\',monospace;color:#4ade80">' + (t || '') + '</td>';
    });
    html += '</tr></tbody>';
    document.getElementById('summary-table').innerHTML = html;
}

// ── EXPORT CSV ────────────────────────────────────────────────────────
function exportCSV() {
    const BOM  = '﻿';
    const cols = ['Fornitore','Codice','Categoria','Prodotto','Conf','PVP'];
    emporiAttivi.forEach(e => {
        cols.push(e.nome+'_VEND.C', e.nome+'_ORD.C', e.nome+'_VEND.P', e.nome+'_ORD.P');
    });
    cols.push('TOT_ORD','TOT_CONF','TOT_VEND');
    const rows = [cols.join(';')];
    righe.forEach(r => {
        const q = quantitaMap[r.id] || {};
        const conf = parseFloat(r.conf) || 0;
        let totOrd = 0, totVend = 0;
        const empData = [];
        emporiAttivi.forEach(emp => {
            const qt  = q[emp.codice] || {};
            const vc  = parseFloat(qt.venduto_corrente)   || 0;
            const ord = parseFloat(qt.ordine_corrente)    || 0;
            const vp  = parseFloat(qt.venduto_precedente) || 0;
            const op  = parseFloat(qt.ordine_precedente)  || 0;
            totOrd += ord; totVend += vp;
            empData.push(vc, ord, vp, op);
        });
        const totConf = conf > 0 && totOrd > 0 ? Math.ceil(totOrd / conf) : '';
        rows.push([
            csvQ(r.fornitore), csvQ(r.codice), csvQ(r.categoria), csvQ(r.prodotto),
            r.conf || '', r.pvp_corrente || '',
            ...empData, totOrd, totConf, totVend,
        ].join(';'));
    });
    const nome = (campagnaCorrente?.nome || 'preordini').replace(/\s+/g, '_');
    const blob = new Blob([BOM + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'preordini_' + nome + '.csv'; a.click();
}

// ── UTILS ─────────────────────────────────────────────────────────────
function csvQ(s) { return '"' + String(s || '').replace(/"/g, '""') + '"'; }
function esc(s)  { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function chiudi(id) { document.getElementById(id).classList.add('hidden'); }
function setSave(msg, type) {
    const el = document.getElementById('save-dot');
    el.textContent = msg; el.className = 'save-dot ' + (type || '');
}
function clearSave() { setSave(''); }
function aggiornaDatalists() {
    const catList = [...new Set(righe.map(r => r.categoria).filter(Boolean))];
    const dl = document.getElementById('dl-cat');
    if (dl) dl.innerHTML = catList.map(c => '<option value="' + esc(c) + '">').join('');
}

document.addEventListener('click', () => {
    if (!document.getElementById('qty-warn').classList.contains('hidden')) hideQtyWarn();
});
document.addEventListener('DOMContentLoaded', init);
