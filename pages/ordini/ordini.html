<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="stylesheet" href="../../assets/style/nav-style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Ordini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .text-m361-green { color: #6b8d53; }
        .bg-m361-green { background-color: #6b8d53; }
        .hover-card:hover { transform: translateY(-4px); transition: all 0.3s ease; }
        
        /* Emporio logos styling */
        .emporio-logos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }
        .emporio-logo-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .emporio-logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        .emporio-logo-name {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            text-align: center;
        }
    </style>
</head>
<body class="bg-slate-50">

    <script src="../../scripts/nav-script.js"></script>
    <main class="max-w-4xl mx-auto p-8 md:pt-24">
        
        <!-- Emporio Logos -->
        <div class="mb-12">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wide mb-4">Empori M361</h2>
            <div class="emporio-logos">
                <div class="emporio-logo-card">
                    <img src="../../assets/images/logo_cremona.png" alt="Cremona" class="emporio-logo-img" onerror="this.style.display='none'">
                    <div class="emporio-logo-name">Cremona</div>
                </div>
                <div class="emporio-logo-card">
                    <img src="../../assets/images/logo_casalmaggiore.png" alt="Casalmaggiore" class="emporio-logo-img" onerror="this.style.display='none'">
                    <div class="emporio-logo-name">Casalmaggiore</div>
                </div>
                <div class="emporio-logo-card">
                    <img src="../../assets/images/logo_reggio_emilia.png" alt="Reggio Emilia" class="emporio-logo-img" onerror="this.style.display='none'">
                    <div class="emporio-logo-name">Reggio Emilia</div>
                </div>
                <div class="emporio-logo-card">
                    <img src="../../assets/images/logo_viadana.png" alt="Viadana" class="emporio-logo-img" onerror="this.style.display='none'">
                    <div class="emporio-logo-name">Viadana</div>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- NUOVO ORDINE -->
            <a href="ordini_nuovi.html" class="hover-card group bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-opacity-10 bg-[#6b8d53] rounded-2xl flex items-center justify-center mb-5 group-hover:bg-[#6b8d53] transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-m361-green group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 uppercase tracking-tight">Nuovo Ordine</h3>
            </a>

            <!-- IN CORSO -->
            <a href="ordini_incorso.html" class="hover-card group bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-opacity-10 bg-[#b75252] rounded-2xl flex items-center justify-center mb-5 group-hover:bg-[#b75252] transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-m361-red group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 uppercase tracking-tight">In Corso</h3>
            </a>

            <!-- ARCHIVIATI -->
            <a href="ordini_archiviati.html" class="hover-card group bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-slate-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-500 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 uppercase tracking-tight">Archiviati</h3>
            </a>

        </div>
    </main>

    <script src="../../scripts/nav-script.js"></script>
</body>
</html>
