<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Modifica Ordine</title>
    
    <!-- CSS Standard dell'App -->
    <link rel="stylesheet" href="../../assets/style/nav-style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Stili specifici per la logica del form ordini */
        .wa-active { color: #25D366; }
        .wa-inactive { color: #cbd5e1; }
        .row-error { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; }
        
        /* Personalizzazione input per uniformarli a nav-style.css */
        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Overlay di caricamento durante il fetch dei dati */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
    
    <link rel="icon" type="image/png" href="../../assets/images/faviconm361.png">
</head>
<body>

    <!-- Caricamento iniziale (facoltativo, gestito via JS) -->
    <div id="loading-overlay">
        <div class="animate-spin text-m361-red text-4xl mb-4"><i class="fas fa-circle-notch"></i></div>
        <p class="text-xs font-bold uppercase tracking-widest text-slate-500">Recupero dati ordine...</p>
    </div>

    <!-- Header e Nav iniettati da nav-script.js -->

    <main class="page-main">
        
        <div class="mb-8">
            <h2 class="m361-sec-title">Modifica Ordine</h2>
            <p class="text-slate-400 text-sm ml-4">Stai modificando un record esistente nel database.</p>
        </div>

        <form id="orderForm" class="space-y" onsubmit="return validateUpdate(event)">
            
            <div class="grid-2">
                <!-- Sezione Emporio -->
                <section class="card card-pad">
                    <h2 class="group-label">Emporio</h2>
                    <div class="space-y">
                        <div>
                            <label class="field-label">Città *</label>
                            <select id="select-emporio" onchange="handleCittaChange(this)" required class="select-input">
                                <option value="Casalmaggiore">Casalmaggiore</option>
                                <option value="Cremona">Cremona</option>
                                <option value="Reggio Emilia">Reggio Emilia</option>
                                <option value="Viadana">Viadana</option>
                            </select>
                        </div>
                        
                        <div id="canale-cremona-container" class="hidden">
                            <label class="field-label">Canale Vendita *</label>
                            <select id="select-canale" class="select-input border-2 border-m361-red bg-red-50">
                                <option value="emporio">Emporio</option>
                                <option value="meridiano361.it">meridiano361.it</option>
                                <option value="on-earth.it">on-earth.it</option>
                            </select>
                        </div>

                        <div>
                            <label class="field-label">Operatore e Data</label>
                            <div class="grid-2">
                                <select id="select-operatore" required class="select-input"></select>
                                <input type="date" id="order-date" required class="input">
                            </div>
                        </div>
                        
                        <!-- L'ID Ordine in modifica è solitamente bloccato (readonly) -->
                        <div>
                            <label class="field-label italic opacity-60">ID Ordine (Sola Lettura)</label>
                            <input type="text" id="numero-ordine-preview" readonly class="input input-mono bg-slate-100 text-[11px] cursor-not-allowed">
                        </div>
                    </div>
                </section>

                <!-- Sezione Cliente -->
                <section class="card card-pad">
                    <h2 class="group-label">Dati Cliente</h2>
                    <div class="space-y">
                        <div class="grid-2">
                            <input type="text" id="cust-nome" placeholder="Nome *" required class="input">
                            <input type="text" id="cust-cognome" placeholder="Cognome *" required class="input">
                        </div>
                        <div class="relative">
                            <input type="tel" id="cust-tel" placeholder="Cellulare *" required class="input pr-12">
                            <button type="button" id="wa-btn" onclick="toggleWA(this)" class="absolute right-3 top-2.5 wa-active">
                                <i class="fab fa-whatsapp fa-lg"></i>
                            </button>
                        </div>
                        <input type="email" id="cust-email" placeholder="Email" class="input">
                        
                        <div>
                            <label class="field-label">Modalità Consegna</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2 text-xs font-bold uppercase cursor-pointer">
                                    <input type="radio" name="mod_consegna" value="Ritiro" class="accent-m361-red"> Ritiro
                                </label>
                                <label class="flex items-center gap-2 text-xs font-bold uppercase cursor-pointer">
                                    <input type="radio" name="mod_consegna" value="Spedizione" class="accent-m361-red"> Spedizione
                                </label>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Contenitore Righe Ordine -->
            <div id="groups-container" class="space-y"></div>

            <div class="flex justify-center py-4">
                <button type="button" onclick="addGroup()" class="btn btn-secondary">
                    <i class="fas fa-plus"></i> Aggiungi Tipologia
                </button>
            </div>

            <!-- Riepilogo Totali -->
            <div class="card card-pad">
                <div class="flex flex-col md:flex-row justify-end items-center gap-6">
                    <div class="text-right">
                        <span class="field-label">Totale Prodotti</span>
                        <span id="grand-total" class="text-2xl font-mono font-bold">€ 0,00</span>
                    </div>
                    <div class="text-right">
                        <span class="field-label">Acconto</span>
                        <input type="text" id="acconto" onfocus="clearCurrency(this)" onblur="formatCurrency(this)" oninput="calcGrandTotal()" class="input input-mono text-xl w-32" value="€ 0,00">
                    </div>
                    <div class="bg-m361-red text-white p-4 rounded-xl text-right min-w-[160px]">
                        <span class="text-[9px] font-black uppercase opacity-80">Saldo da Versare</span>
                        <div id="saldo-finale" class="text-2xl font-mono font-bold">€ 0,00</div>
                    </div>
                </div>
            </div>

            <textarea id="order-notes" class="textarea-input" placeholder="Note interne o modifiche apportate..."></textarea>

            <div class="flex gap-4">
                <button type="button" onclick="history.back()" class="btn btn-secondary flex-1 justify-center">
                    Annulla
                </button>
                <button type="submit" id="submit-btn" class="btn btn-primary flex-[2] justify-center text-sm py-5 shadow-lg">
                    <i class="fas fa-sync-alt"></i> Aggiorna Ordine
                </button>
            </div>
        </form>

    </main>

    <!-- Script di Navigazione -->
    <script src="../../scripts/nav-script.js"></script>
    
    <!-- Supabase e Logica -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // La tua logica di fetch dati qui
        // window.onload = async () => { ... riempi i campi ... document.getElementById('loading-overlay').remove(); }
    </script>
</body>
</html>
