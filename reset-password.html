<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/faviconm361.png" type="image/png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Reimposta Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-[400px] bg-white p-10 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">Meridiano <span class="text-[#B5453A]">361</span></h1>
            <p class="text-slate-500 font-medium mt-2">Reimposta password</p>
        </div>

        <!-- Loading -->
        <div id="loading-view" class="text-center space-y-4 py-4">
            <div class="w-10 h-10 border-4 border-slate-200 border-t-[#B5453A] rounded-full animate-spin mx-auto"></div>
            <p class="text-sm text-slate-400 font-medium">Verifica del link in corso...</p>
        </div>

        <!-- Form nuova password -->
        <div id="form-view" class="hidden space-y-6">
            <div class="text-center">
                <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-lock text-[#B5453A] text-xl"></i>
                </div>
                <p class="text-sm text-slate-500">Scegli la tua nuova password</p>
            </div>

            <div id="form-error" class="hidden bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold border border-red-100 flex items-center gap-2">
                <i class="fas fa-exclamation-circle"></i>
                <span id="form-error-text"></span>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Nuova password</label>
                <input type="password" id="new-pwd" minlength="6" placeholder="Minimo 6 caratteri"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-[#B5453A] focus:ring-4 focus:ring-red-50 transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Conferma password</label>
                <input type="password" id="conf-pwd" minlength="6" placeholder="Ripeti la password"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-[#B5453A] focus:ring-4 focus:ring-red-50 transition-all">
            </div>

            <button onclick="doReset()" id="reset-btn"
                class="w-full bg-[#B5453A] hover:bg-[#a14545] text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl shadow-red-100 transition-all active:scale-[0.98]">
                <div id="reset-spinner" class="spinner"></div>
                <span id="reset-label">Salva nuova password</span>
            </button>
        </div>

        <!-- Successo -->
        <div id="success-view" class="hidden text-center space-y-4 py-4">
            <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto">
                <i class="fas fa-check-circle text-green-500 text-3xl"></i>
            </div>
            <p class="font-bold text-slate-700">Password aggiornata!</p>
            <p class="text-sm text-slate-400">Verrai reindirizzato al login...</p>
        </div>

        <!-- Link scaduto/non valido -->
        <div id="error-view" class="hidden text-center space-y-4 py-4">
            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto">
                <i class="fas fa-times-circle text-red-400 text-3xl"></i>
            </div>
            <p class="font-bold text-slate-700">Link non valido o scaduto</p>
            <p class="text-sm text-slate-400">Richiedi un nuovo link dalla pagina di login.</p>
            <a href="/login.html" class="inline-block mt-2 text-sm font-bold text-[#B5453A] hover:underline">
                ← Torna al login
            </a>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient(
            'https://hsalynvxazxqtmsvjrzc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
        );

        let recoveryReady = false;

        // Supabase rileva il token nell'hash URL e scatena PASSWORD_RECOVERY
        _supabase.auth.onAuthStateChange((event) => {
            if (event === 'PASSWORD_RECOVERY') {
                recoveryReady = true;
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('form-view').classList.remove('hidden');
                document.getElementById('new-pwd').focus();
            }
        });

        // Fallback: se dopo 4 secondi nessun evento, link non valido
        setTimeout(() => {
            if (!recoveryReady) {
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('error-view').classList.remove('hidden');
            }
        }, 4000);

        async function doReset() {
            const pwd = document.getElementById('new-pwd').value;
            const conf = document.getElementById('conf-pwd').value;
            const errDiv = document.getElementById('form-error');
            const errText = document.getElementById('form-error-text');
            const btn = document.getElementById('reset-btn');

            errDiv.classList.add('hidden');

            if (pwd.length < 6) {
                errText.textContent = 'La password deve essere di almeno 6 caratteri.';
                errDiv.classList.remove('hidden');
                return;
            }
            if (pwd !== conf) {
                errText.textContent = 'Le password non coincidono.';
                errDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            document.getElementById('reset-spinner').style.display = 'block';
            document.getElementById('reset-label').textContent = 'Salvataggio...';

            const { error } = await _supabase.auth.updateUser({ password: pwd });

            if (error) {
                errText.textContent = 'Errore nel salvataggio. Richiedi un nuovo link.';
                errDiv.classList.remove('hidden');
                btn.disabled = false;
                document.getElementById('reset-spinner').style.display = 'none';
                document.getElementById('reset-label').textContent = 'Salva nuova password';
            } else {
                document.getElementById('form-view').classList.add('hidden');
                document.getElementById('success-view').classList.remove('hidden');
                setTimeout(() => { window.location.href = '/login.html'; }, 2500);
            }
        }

        // Enter sulla conferma password triggera il reset
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('conf-pwd').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') doReset();
            });
        });
    </script>
</body>
</html>
